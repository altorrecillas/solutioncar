// --- Cifrado del backup (AES-GCM con clave derivada por PBKDF2) -----------
const _b64 = (u8) => { let s = ''; const CH = 0x8000; for (let i = 0; i < u8.length; i += CH) s += String.fromCharCode.apply(null, u8.subarray(i, i + CH)); return btoa(s); };
const _ub64 = (str) => Uint8Array.from(atob(str), (c) => c.charCodeAt(0));
async function deriveKey(password, salt) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}
async function encryptBackup(obj, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(obj))));
  return JSON.stringify({ sc_enc: 1, v: 1, salt: _b64(salt), iv: _b64(iv), data: _b64(ct) });
}
async function decryptBackup(env, password) {
  const key = await deriveKey(password, _ub64(env.salt));
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: _ub64(env.iv) }, key, _ub64(env.data));
  return JSON.parse(new TextDecoder().decode(pt));
}
// Pide una contraseña en una hoja inferior (confirm=true pide repetirla).
function askPassword(title, confirm) {
  return new Promise((resolve) => {
    const s = openSheet(`<div class="sheet-title">${esc(title)}</div>
      <div class="pw-sheet">
        <input type="password" id="pw1" placeholder="Contraseña" autocomplete="off" autocapitalize="none">
        ${confirm ? '<input type="password" id="pw2" placeholder="Repite la contraseña" autocomplete="off" autocapitalize="none">' : ''}
        <p class="error hidden" id="pw-err"></p>
        <div class="sheet-confirm-actions">
          <button class="btn sheet-no">Cancelar</button>
          <button class="btn btn-primary sheet-ok">Aceptar</button>
        </div></div>`);
    let done = false;
    const finish = (v) => { if (done) return; done = true; closeSheet(); resolve(v); };
    const err = (m) => { const e = $('#pw-err', s); e.textContent = m; e.classList.remove('hidden'); };
    $('.sheet-no', s).addEventListener('click', () => finish(null));
    $('.sheet-backdrop', s).addEventListener('click', () => finish(null));
    $('.sheet-ok', s).addEventListener('click', () => {
      const p1 = $('#pw1', s).value;
      if (!p1 || p1.length < 4) return err('Mínimo 4 caracteres.');
      if (confirm && p1 !== $('#pw2', s).value) return err('Las contraseñas no coinciden.');
      finish(p1);
    });
    setTimeout(() => { const i = $('#pw1', s); if (i) i.focus(); }, 60);
  });
}

// Adjunta las fotos de recibos (IndexedDB) al objeto de backup.
async function buildReceiptsMap(expenses) {
  const out = {};
  const keys = await receiptKeys();
  for (const e of expenses || []) {
    if (keys.has('e' + e.id)) { const d = await receiptGet(e.id); if (d) out[e.id] = d; }
  }
  return out;
}
async function restoreReceipts(receipts, idMap) {
  try { await receiptClear(); } catch (e) {}
  for (const oldId of Object.keys(receipts || {})) {
    const nid = idMap[oldId];
    if (nid == null) continue;
    try { await receiptPut(nid, receipts[oldId]); } catch (e) {}
  }
}

// Construye el fichero de copia (con fotos y cifrado opcional). Devuelve
// {filename, text} o null si el usuario cancela.
async function buildBackupFile() {
  let data;
  try { data = await api('GET', '/export'); data.receipts = await buildReceiptsMap(data.expenses); }
  catch (ex) { toast(ex.message, true); return null; }
  const nPhotos = Object.keys(data.receipts).length;
  const encrypt = await confirmSheet(`¿Proteger la copia con una contraseña?${nPhotos ? `\nIncluye ${nPhotos} foto(s) de recibos.` : ''}`, { okLabel: 'Con contraseña', danger: false });
  let text, enc = false;
  if (encrypt) {
    const pw = await askPassword('Contraseña de la copia', true);
    if (!pw) return null;
    try { text = await encryptBackup(data, pw); enc = true; } catch (ex) { toast('No se pudo cifrar', true); return null; }
  } else {
    text = JSON.stringify(data, null, 2);
  }
  return { filename: `solutioncar-backup${enc ? '-cifrado' : ''}.json`, text };
}

async function exportBackup() {
  if (!window.LOCAL_MODE && !androidFile()) { window.location.href = '/api/export'; return; }
  const r = await buildBackupFile();
  if (!r) return;
  const af = androidFile();
  if (af) { af.save(r.filename, r.text); return; } // el selector incluye Google Drive (confirma __fileSaved)
  const blob = new Blob([r.text], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = r.filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  markBackupDone();
  toast('Copia descargada');
}

// Comparte la copia por la hoja de Android (Drive, Gmail, etc.) o Web Share.
async function shareBackup() {
  const r = await buildBackupFile();
  if (!r) return;
  const s = androidShare();
  if (s && s.file) { s.file(r.filename, 'application/json', r.text); markBackupDone(); return; }
  if (navigator.share && navigator.canShare) {
    try {
      const file = new File([r.text], r.filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: 'Copia de SolutionCar' }); markBackupDone(); return; }
    } catch (e) {}
  }
  // Último recurso: descarga.
  const blob = new Blob([r.text], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = r.filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  markBackupDone();
  toast('Copia lista para compartir');
}

async function importBackupText(text) {
  if (!text) return;
  let data;
  try {
    data = JSON.parse(text);
  } catch (ex) { return toast('El fichero no es un JSON válido', true); }
  if (data && data.sc_enc) {
    const pw = await askPassword('Contraseña de la copia', false);
    if (!pw) return;
    try { data = await decryptBackup(data, pw); }
    catch (e) { return toast('Contraseña incorrecta o fichero dañado', true); }
  }
  if (!(await confirmSheet('Restaurar este backup REEMPLAZARÁ todos los datos actuales. ¿Continuar?', { okLabel: 'Restaurar' }))) return;
  try {
    const r = await api('POST', '/import', data);
    if (data.receipts && r.expenseIdMap) await restoreReceipts(data.receipts, r.expenseIdMap);
    await loadVehicles();
    renderTab();
    const ph = data.receipts && r.expenseIdMap ? Object.keys(data.receipts).length : 0;
    toast(`Backup restaurado: ${r.vehicles} vehículos, ${r.fuel_logs} repostajes, ${r.expenses} gastos${ph ? `, ${ph} foto(s)` : ''}`);
  } catch (ex) {
    toast(ex.message, true);
  }

// Arranque
// ---------------------------------------------------------------------------
// Envía al Android nativo (APK) una copia de los recordatorios pendientes para
// que el chequeo diario en 2º plano lance notificaciones de mantenimiento.
// Snapshot para el widget de pantalla de inicio (vehículo activo).
function buildWidgetSnapshot(v, s, rems, fuel, trips) {
  const ev = v.fuel_type === 'electrico';
  const nf = s.insights && s.insights.nextFuel;
  const hasRange = !!(rangeAlertOn() && nf && nf.pctRemaining != null);
  const pend = (rems || []).filter((r) => !r.done);
  const nextRem = pend.filter((r) => r.due_date).sort((a, b) => (a.due_date || '').localeCompare(b.due_date || ''))[0] || pend[0] || null;
  let range2 = fmtEur(s.totalCost), sub2 = 'Gasto total';
  if (nextRem) {
    range2 = nextRem.title;
    sub2 = nextRem.due_date ? 'Aviso: ' + fmtDate(nextRem.due_date) : (nextRem.due_odo ? 'Aviso a ' + fmtKm(nextRem.due_odo) : 'Próximo aviso');
  }
  // Datos extra para los widgets de Panel y Consumo (opcionales).
  const consList = (fuel || []).filter((f) => f.consumption != null)
    .sort((a, b) => new Date(a.date) - new Date(b.date) || a.odometer - b.odometer);
  const spark = consList.slice(-8).map((f) => +f.consumption.toFixed(1));
  const curMonth = new Date().toISOString().slice(0, 7);
  const monthRow = (s.monthlySeries || []).find((m) => m.month === curMonth);
  const weekAgo = Date.now() - 7 * 864e5;
  const weekKm = Math.round((trips || []).reduce((sum, t) => {
    const d = new Date(t.start_date || t.end_date || 0).getTime();
    if (!(d >= weekAgo)) return sum;
    const km = t.distance != null ? t.distance : (t.end_odo != null && t.start_odo != null ? t.end_odo - t.start_odo : 0);
    return sum + (km > 0 ? km : 0);
  }, 0));
  return {
    vehicle: v.name, ev,
    rangeKm: hasRange ? Math.round(nf.kmRemaining) : null,
    rangeKmText: hasRange ? fmtKm(nf.kmRemaining) : '',
    rangePct: hasRange ? nf.pctRemaining : 0,
    sub: hasRange ? `${nf.pctRemaining}% · ${ev ? 'batería' : 'depósito'}` : '',
    range2, sub2,
    cons: spark.length ? spark[spark.length - 1] : null,
    consAvg: s.avgConsumption != null ? +s.avgConsumption.toFixed(1) : null,
    consUnit: ev ? 'kWh/100km' : 'l/100km',
    spark,
    monthSpend: monthRow ? monthRow.total : 0,
    weekKm,
    nextRem: nextRem ? nextRem.title : null,
    nextRemSub: nextRem ? sub2 : null,
  };
}

let _nativeSyncTimer = null;
function syncNativeReminders(force) {
  const hasNotify = window.AndroidNotify && typeof window.AndroidNotify.sync === 'function';
  const hasWidget = window.AndroidWidget && typeof window.AndroidWidget.update === 'function';
  if (!hasNotify && !hasWidget) return;
  if (!force && !nativeDataDirty) return; // nada cambió: la notificación/widget siguen al día
  clearTimeout(_nativeSyncTimer);
  _nativeSyncTimer = setTimeout(async () => {
    nativeDataDirty = false; // si algo escribe durante el recálculo, se re-marca
    try {
      const vehicles = await api('GET', '/vehicles');
      const items = [];
      let widget = null;
      for (const v of vehicles) {
        if (!v.active) continue;
        const [rems, s] = await Promise.all([
          api('GET', `/vehicles/${v.id}/reminders`),
          api('GET', `/vehicles/${v.id}/stats`),
        ]);
        for (const r of rems) {
          if (r.done) continue;
          const kmRemaining = r.due_odo != null && r.due_odo > 0 && s.maxOdo != null ? r.due_odo - s.maxOdo : null;
          items.push({ title: r.title, vehicle: v.name, dueDate: r.due_date || null, kmRemaining });
        }
        // Aviso inteligente de autonomía: si queda poco depósito/batería (opcional).
        const nf = s.insights && s.insights.nextFuel;
        if (rangeAlertOn() && nf && nf.pctRemaining != null && nf.pctRemaining <= 18 && nf.kmRemaining != null) {
          const ev = v.fuel_type === 'electrico';
          items.push({ title: `Repón ${ev ? 'batería' : 'combustible'}: quedan ~${fmtKm(nf.kmRemaining)} (${nf.pctRemaining}%)`, vehicle: v.name, dueDate: null, kmRemaining: Math.max(0, Math.round(nf.kmRemaining)) });
        }
        if (v.id === state.currentId) {
          // Datos extra solo para el vehículo del widget (consumo y km de la semana).
          const [fuel2, trips2] = await Promise.all([
            api('GET', `/vehicles/${v.id}/fuel`).catch(() => []),
            api('GET', `/vehicles/${v.id}/trips`).catch(() => []),
          ]);
          widget = buildWidgetSnapshot(v, s, rems, fuel2, trips2);
        }
      }
      if (hasNotify) window.AndroidNotify.sync(JSON.stringify({ daysAhead: 30, kmAhead: 1000, hour: notifyHour(), items }));
      // Si el vehículo activo está inactivo (fuera del bucle), calcula su snapshot.
      if (hasWidget && !widget && state.currentId) {
        const cv = vehicles.find((x) => x.id === state.currentId);
        if (cv) {
          try {
            const [rems2, s2, fuel2, trips2] = await Promise.all([
              api('GET', `/vehicles/${cv.id}/reminders`), api('GET', `/vehicles/${cv.id}/stats`),
              api('GET', `/vehicles/${cv.id}/fuel`).catch(() => []), api('GET', `/vehicles/${cv.id}/trips`).catch(() => []),
            ]);
            widget = buildWidgetSnapshot(cv, s2, rems2, fuel2, trips2);
          } catch (e) {}
        }
      }
      if (hasWidget && widget) { try { window.AndroidWidget.update(JSON.stringify(widget)); } catch (e) {} }
    } catch (e) { /* sin conexión con el nativo */ }
  }, 800);
}

window.showOnboarding = function () {
  let i = 0;
  const ov = document.createElement('div');
  ov.id = 'onboard';
  ov.className = 'onboard';
  document.body.appendChild(ov);
  // Congela el fondo mientras el tutorial esté abierto (evita que la lista de
  // ajustes se mueva/rebote detrás del overlay traslúcido).
  document.documentElement.classList.add('onb-lock');

  // En el WebView de Android, si se abre con la página desplazada (p. ej. desde
  // Ajustes), un overlay position:fixed + 100dvh puede pintarse con una altura
  // obsoleta hasta el primer relayout. Fijamos la altura real del viewport y la
  // reafirmamos en los siguientes frames para que quede bien desde el principio.
  const fit = () => { ov.style.height = (window.visualViewport?.height || window.innerHeight) + 'px'; };
  fit();
  requestAnimationFrame(() => { fit(); requestAnimationFrame(fit); });
  window.addEventListener('resize', fit);
  window.visualViewport?.addEventListener('resize', fit);

  const finish = () => {
    try { localStorage.setItem('sc_onboarded', '1'); } catch (e) {}
    document.documentElement.classList.remove('onb-lock');
    window.removeEventListener('resize', fit);
    window.visualViewport?.removeEventListener('resize', fit);
    ov.classList.add('closing');
    setTimeout(() => ov.remove(), 220);
  };
  ov.__onbFinish = finish; // permite cerrarlo desde el botón atrás de Android
  const draw = () => {
    const s = ONBOARD_STEPS[i];
    const last = i === ONBOARD_STEPS.length - 1;
    ov.innerHTML = `<div class="onb-card">
      <button class="onb-skip" type="button">Saltar</button>
      <div class="onb-art">${ic(s.icon)}</div>
      <h2 class="onb-title">${s.title}</h2>
      <p class="onb-text">${s.text}</p>
      <div class="onb-dots">${ONBOARD_STEPS.map((_, k) => `<span class="onb-dot ${k === i ? 'on' : ''}"></span>`).join('')}</div>
      <button class="btn btn-primary onb-next" type="button">${last ? 'Empezar' : 'Siguiente'}</button>
    </div>`;
    $('.onb-skip', ov).addEventListener('click', finish);
    $('.onb-next', ov).addEventListener('click', () => { haptic(8); if (last) finish(); else { i++; draw(); } });
  };
  draw();
};

  $$('.tab').forEach((b) => b.classList.remove('active'));
  if (primary) primary.classList.add('active');
  else { const more = $('#btn-more'); if (more) more.classList.add('active'); } // resaltar "Más" si el destino está dentro
  $$('.tab-panel').forEach((p) => p.classList.add('hidden'));
  const panel = $('#tab-' + tab);
  if (panel) {
    panel.classList.remove('hidden', 'slide-l', 'slide-r', 'panel-anim');
    void panel.offsetWidth; // reinicia la animación de entrada
    panel.classList.add(dir === 'next' ? 'slide-l' : dir === 'prev' ? 'slide-r' : 'panel-anim');
    if ($('#main')) $('#main').scrollTop = 0;
  }
  renderTab();
}

$$('.tab[data-tab]').forEach((btn) => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

$('#btn-more').addEventListener('click', () => {
  actionSheet('Más', OVERFLOW_TABS.map(([id, icon, label]) => ({ label, icon, cb: () => switchTab(id) })));
});

function currentVehicle() {
  return state.vehicles.find((v) => v.id === state.currentId) || null;
}

async function renderTab() {
  const tab = state.activeTab;
  const fab = $('#fab');
  fab.classList.toggle('hidden', tab === 'dashboard' || tab === 'settings');
  // Muestra un placeholder mientras cargan los datos (si el panel está vacío).
  const panel = $('#tab-' + tab);
  if (panel && !panel.innerHTML.trim() && tab !== 'settings') {
    panel.innerHTML = skeleton(tab === 'dashboard' ? 'dashboard' : 'list');
  }
  try {
    if (tab === 'dashboard') await renderDashboard();
    else if (tab === 'fuel') await renderFuel();
    else if (tab === 'expenses') await renderExpenses();
    else if (tab === 'reminders') await renderReminders();
    else if (tab === 'trips') await renderTrips();
    else if (tab === 'vehicles') await renderVehicles();
    else if (tab === 'settings') await renderSettings();
  } catch (ex) {
    if (ex.message !== 'No autenticado') toast(ex.message, true);
  }
  syncNativeReminders(); // mantiene al día el chequeo nativo de mantenimiento (APK)
}

// ---------------------------------------------------------------------------
// Graficas SVG (sin dependencias): linea con tooltip y crosshair
// ---------------------------------------------------------------------------
const CHART = { w: 600, h: 210, pad: { t: 14, r: 14, b: 26, l: 46 } };
const chartRegistry = {};
let chartSeq = 0;

function fmtTickVal(v) {
  return Math.abs(v) >= 100 ? num0.format(v) : Math.abs(v) >= 10 ? num1.format(v) : num2.format(v);
}

// points: [{date:'YYYY-MM-DD', value:number}] ordenados por fecha
// Curva suave (Catmull-Rom -> Bézier) para las gráficas de línea.
function smoothPath(pts) {
  if (pts.length < 2) return '';
  let d = `M${pts[0].cx.toFixed(1)},${pts[0].cy.toFixed(1)}`;
  const t = 0.16;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;
    const c1x = p1.cx + (p2.cx - p0.cx) * t, c1y = p1.cy + (p2.cy - p0.cy) * t;
    const c2x = p2.cx - (p3.cx - p1.cx) * t, c2y = p2.cy - (p3.cy - p1.cy) * t;
    d += ` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2.cx.toFixed(1)},${p2.cy.toFixed(1)}`;
  }
  return d;
}

function lineChart(points, { unit = '' } = {}) {
  if (points.length < 2) return null;
  const { w, h, pad } = CHART;
  const xs = points.map((p) => new Date(p.date + 'T00:00:00').getTime());
  const ys = points.map((p) => p.value);
  let ymin = Math.min(...ys);
  let ymax = Math.max(...ys);
  if (ymin === ymax) { ymin -= 1; ymax += 1; }
  else { const m = (ymax - ymin) * 0.12; ymin = Math.max(0, ymin - m); ymax += m; }
  const xmin = xs[0];
  const xmax = xs[xs.length - 1];
  const X = (x) => pad.l + ((x - xmin) / (xmax - xmin || 1)) * (w - pad.l - pad.r);
  const Y = (y) => pad.t + (1 - (y - ymin) / (ymax - ymin)) * (h - pad.t - pad.b);

  const px = points.map((p, i) => ({ cx: X(xs[i]), cy: Y(ys[i]), date: p.date, value: p.value }));
  const linePath = smoothPath(px);
  const baseY = (h - pad.b).toFixed(1);
  const areaPath = `${linePath} L${px[px.length - 1].cx.toFixed(1)},${baseY} L${px[0].cx.toFixed(1)},${baseY} Z`;

  // Grid recesivo: 3 lineas horizontales con etiqueta
  const ticks = [ymin, (ymin + ymax) / 2, ymax];
  const grid = ticks
    .map((t) => {
      const y = Y(t).toFixed(1);
      return `<line x1="${pad.l}" y1="${y}" x2="${w - pad.r}" y2="${y}" class="grid"/>
        <text x="${pad.l - 6}" y="${y}" class="tick" text-anchor="end" dominant-baseline="middle">${fmtTickVal(t)}</text>`;
    })
    .join('');

  // Etiquetas X: primera, central y ultima fecha
  const xlbl = (t) => new Date(t).toLocaleDateString('es-ES', { month: 'short', year: '2-digit' });
  const xLabels = [
    [xmin, 'start'],
    [(xmin + xmax) / 2, 'middle'],
    [xmax, 'end'],
  ]
    .map(
      ([t, anchor]) =>
        `<text x="${X(t).toFixed(1)}" y="${h - 6}" class="tick" text-anchor="${anchor}">${xlbl(t)}</text>`
    )
    .join('');

  // Puntos discretos (solo si no hay demasiados) + endpoint destacado.
  const dots =
    px.length <= 40
      ? px.map((p) => `<circle cx="${p.cx.toFixed(1)}" cy="${p.cy.toFixed(1)}" r="2.5" class="dot"/>`).join('')
      : '';
  const last = px[px.length - 1];
  const endDot = `<circle cx="${last.cx.toFixed(1)}" cy="${last.cy.toFixed(1)}" r="4.5" class="end-dot"/>`;

  const id = 'chart' + ++chartSeq;
  chartRegistry[id] = { px, unit };
  return `<div class="chart-wrap"><svg id="${id}" viewBox="0 0 ${w} ${h}" data-chart preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="stroke-${id}" class="grad-stroke" x1="0" y1="0" x2="${w}" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0" class="gs-0"/><stop offset="1" class="gs-1"/>
      </linearGradient>
      <linearGradient id="area-${id}" class="grad-area" x1="0" y1="${pad.t}" x2="0" y2="${baseY}" gradientUnits="userSpaceOnUse">
        <stop offset="0" class="ga-0"/><stop offset="1" class="ga-1"/>
      </linearGradient>
    </defs>
    ${grid}${xLabels}
    <path d="${areaPath}" class="series-area" fill="url(#area-${id})"/>
    <path d="${linePath}" class="series" pathLength="1" stroke="url(#stroke-${id})"/>
    ${dots}${endDot}
    <line class="crosshair hidden" y1="${pad.t}" y2="${h - pad.b}"/>
    <circle class="hover-dot hidden" r="5"/>
  </svg></div>`;
}

function getChartTip() {
  let tip = $('#chart-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'chart-tip';
    tip.className = 'chart-tip hidden';
    document.body.appendChild(tip);
  }
  return tip;
}

function initChartHovers(root) {
  $$('svg[data-chart]', root).forEach((svg) => {
    const data = chartRegistry[svg.id];
    if (!data) return;
    const cross = $('.crosshair', svg);
    const hoverDot = $('.hover-dot', svg);
    const tip = getChartTip();
    const hide = () => {
      cross.classList.add('hidden');
      hoverDot.classList.add('hidden');
      tip.classList.add('hidden');
    };
    svg.addEventListener('pointermove', (e) => {
      const rect = svg.getBoundingClientRect();
      const mx = ((e.clientX - rect.left) / rect.width) * CHART.w;
      let best = null;
      for (const p of data.px) {
        if (!best || Math.abs(p.cx - mx) < Math.abs(best.cx - mx)) best = p;
      }
      if (!best) return;
      cross.setAttribute('x1', best.cx);
      cross.setAttribute('x2', best.cx);
      cross.classList.remove('hidden');
      hoverDot.setAttribute('cx', best.cx);
      hoverDot.setAttribute('cy', best.cy);
      hoverDot.classList.remove('hidden');
      tip.textContent = `${fmtDate(best.date)} · ${fmtTickVal(best.value)} ${data.unit}`;
      tip.classList.remove('hidden');
      const tw = tip.offsetWidth;
      tip.style.left = Math.min(Math.max(e.clientX - tw / 2, 8), window.innerWidth - tw - 8) + 'px';
      tip.style.top = rect.top + window.scrollY - 34 + 'px';
      tip.style.position = 'absolute';
    });
    svg.addEventListener('pointerleave', hide);
  });
}

// Paleta para el gráfico de dona (colores distinguibles y coherentes).
const DONUT_COLORS = ['#0d9488', '#0891b2', '#6366f1', '#f59e0b', '#e11d48', '#22c55e', '#a855f7', '#f97316', '#0ea5e9', '#64748b'];
function donutHTML(entries, total, lab) {
  if (!entries.length || total <= 0) return '<p class="muted">Sin gastos registrados.</p>';
  const r = 54, C = 2 * Math.PI * r, cx = 70, cy = 70;
  let off = 0;
  const segs = entries.map(([c, val], i) => {
    const frac = val / total;
    let len = frac * C;
    const gap = Math.min(4, len * 0.4);
    len = Math.max(0.5, len - gap);
    const col = DONUT_COLORS[i % DONUT_COLORS.length];
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="16" stroke-dasharray="${len.toFixed(2)} ${(C - len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off += frac * C;
    return s;
  }).join('');
  const legend = entries.map(([c, val], i) => {
    const col = DONUT_COLORS[i % DONUT_COLORS.length];
    const name = c === 'combustible' ? lab.fuelWord : catName(c);
    const pct = Math.round((val / total) * 100);
    return `<div class="donut-leg"><span class="donut-swatch" style="background:${col}"></span><span class="donut-leg-name">${esc(name)}</span><span class="donut-leg-val">${fmtEur(val)} · ${pct}%</span></div>`;
  }).join('');
  return `<div class="donut-wrap">
    <svg viewBox="0 0 140 140" class="donut" role="img" aria-label="Gasto por categoría">
      ${segs}
      <circle cx="${cx}" cy="${cy}" r="45" class="donut-hole"/>
      <text x="${cx}" y="66" text-anchor="middle" class="donut-total">${fmtEur(total)}</text>
      <text x="${cx}" y="83" text-anchor="middle" class="donut-sub">total</text>
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}

// Estadísticas de repostaje: precio medio, tendencia, gasolineras y mes vs mes.
function fuelInsightsHTML(list, lab) {
  const withPrice = list.filter((f) => f.price_per_l != null && f.price_per_l > 0);
  const monthSum = {};
  list.forEach((f) => { if (f.date && f.total_cost) { const m = f.date.slice(0, 7); monthSum[m] = (monthSum[m] || 0) + f.total_cost; } });
  const months = Object.keys(monthSum).sort();
  if (withPrice.length < 2 && months.length < 1) return '';
  // Precio medio ponderado por energía (coste real ÷ litros/kWh), no media simple.
  const pricedLiters = withPrice.reduce((a, f) => a + (f.liters || 0), 0);
  const pricedCost = withPrice.reduce((a, f) => a + f.price_per_l * (f.liters || 0), 0);
  const avgPrice = pricedLiters > 0 ? pricedCost / pricedLiters : (withPrice.length ? withPrice.reduce((a, f) => a + f.price_per_l, 0) / withPrice.length : null);
  const latest = withPrice.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
  const lastPrice = latest ? latest.price_per_l : null;
  const trend = avgPrice && lastPrice != null ? ((lastPrice - avgPrice) / avgPrice) * 100 : null;
  const thisM = months.length ? monthSum[months[months.length - 1]] : 0;
  const prevM = months.length > 1 ? monthSum[months[months.length - 2]] : null;
  const monthDiff = prevM != null && prevM > 0 ? ((thisM - prevM) / prevM) * 100 : null;

  const byStation = {};
  withPrice.forEach((f) => { const s = (f.station || '').trim(); if (!s) return; byStation[s] = byStation[s] || { sum: 0, n: 0 }; byStation[s].sum += f.price_per_l; byStation[s].n++; });
  const stationAvgs = Object.entries(byStation).map(([s, o]) => [s, o.sum / o.n, o.n]).sort((a, b) => a[1] - b[1]);
  const cheapest = stationAvgs[0];
  const dearest = stationAvgs.length > 1 ? stationAvgs[stationAvgs.length - 1] : null;

  const pxDisp = (ppl) => num2.format(lab.priceToDisp(ppl)) + ' ' + lab.price;
  const trendChip = trend == null ? '—'
    : `<span class="trend ${trend > 0.5 ? 'up' : trend < -0.5 ? 'down' : ''}">${trend > 0 ? '+' : ''}${num1.format(trend)}%</span>`;
  const stats = [
    ['Precio medio', avgPrice != null ? pxDisp(avgPrice) : '—'],
    ['Última vs media', trendChip],
    ['Este mes', fmtEur(thisM) + (monthDiff != null ? ` <span class="trend ${monthDiff > 0.5 ? 'up' : monthDiff < -0.5 ? 'down' : ''}">${monthDiff > 0 ? '+' : ''}${num0.format(monthDiff)}%</span>` : '')],
    ['Estaciones', stationAvgs.length ? num0.format(stationAvgs.length) : '—'],
  ];
  const stationLine = cheapest
    ? `<p class="muted" style="font-size:12.5px;margin:10px 0 0">${ic('fuel')} Más barata: <strong>${esc(cheapest[0])}</strong> (${pxDisp(cheapest[1])})${dearest ? ` · Más cara: <strong>${esc(dearest[0])}</strong> (${pxDisp(dearest[1])})` : ''}</p>`
    : '';
  return `<div class="card">
    <h3>${ic('activity')} Estadísticas de ${lab.section.toLowerCase()}</h3>
    <div class="grid stats-grid">${stats.map(([l, val]) => `<div class="stat"><div class="label">${l}</div><div class="value">${val}</div></div>`).join('')}</div>
    ${stationLine}
  </div>`;
}

async function renderDashboard() {
  const el = $('#tab-dashboard');
  const v = currentVehicle();
  if (!v) return noVehicleMsg(el);
  for (const k in chartRegistry) delete chartRegistry[k]; // evita acumular gráficas viejas

  const [s, rem, timeline, compare] = await Promise.all([
    api('GET', `/vehicles/${v.id}/stats`),
    api('GET', `/vehicles/${v.id}/reminders`),
    api('GET', `/vehicles/${v.id}/timeline`),
    api('GET', '/compare'),
  ]);
  const dueReminders = rem.filter((r) => !r.done && reminderStatus(r, s.maxOdo).status !== 'ok');
  const lab = L(v);

  const stats = [
    ['Odómetro', fmtKm(s.maxOdo), 'wide'],
    ['Gasto total', fmtEur(s.totalCost)],
    ['Distancia', fmtKm(s.distance)],
    [`Coste / ${dU().u}`, s.costPerKm != null ? eur.format(s.costPerKm / dU().f) : '—'],
    ['Consumo medio', s.overallConsumption != null ? num1.format(lab.consToDisp(s.overallConsumption)) + ` <small>${lab.cons}</small>` : '—'],
    [lab.ev ? 'Recarga' : 'Combustible', fmtEur(s.fuelCost)],
    ['Otros gastos', fmtEur(s.expenseCost)],
    [lab.ev ? 'kWh totales' : `${vU().u} totales`, fmtEnergyRaw(lab.energyToDisp(s.fuelLiters), lab.energy)],
    [lab.section, num0.format(s.fillCount)],
  ];

  // Tarjeta de ahorro para vehiculos electricos.
  let evHtml = '';
  if (s.isEV && s.ev) {
    const e = s.ev;
    const positive = e.savings >= 0;
    evHtml = `<div class="card ev-card">
      <h3>${ic('bulb')} Ahorro frente a un coche de combustión</h3>
      <div class="ev-savings ${positive ? 'pos' : 'neg'}">
        <div class="ev-amount">${positive ? '+' : ''}${fmtEur(e.savings)}</div>
        <div class="muted">${positive ? 'ahorrado' : 'de más'} en ${fmtKm(s.distance)}${e.savingsPct != null ? ` · ${e.savingsPct}%` : ''}</div>
      </div>
      <div class="grid stats-grid" style="margin-top:12px">
        <div class="stat"><div class="label">Coste real recarga</div><div class="value">${fmtEur(e.chargingCost)}</div></div>
        <div class="stat"><div class="label">Habría costado en combustible</div><div class="value">${fmtEur(e.equivalentFuelCost)}</div></div>
        <div class="stat"><div class="label">Ahorro por km</div><div class="value">${e.savingsPerKm != null ? eur.format(e.savingsPerKm) : '—'}</div></div>
        <div class="stat"><div class="label">Precio medio recarga</div><div class="value">${e.avgPricePerKwh != null ? num2.format(e.avgPricePerKwh) + ' <small>€/kWh</small>' : '—'}</div></div>
      </div>
      <p class="muted" style="margin:12px 0 0;font-size:12px">Referencia: coche de combustión de ${num1.format(e.refConsumption)} L/100km a ${num2.format(e.refFuelPrice)} €/L (equivaldría a ${num1.format(e.equivalentFuelLiters)} L). Edita estos valores en el vehículo.</p>
    </div>`;
  }

  const months = s.monthlySeries.slice(-12);
  const maxMonth = Math.max(1, ...months.map((m) => m.total));
  const bars = months.length
    ? months
        .map((m, i) => {
          const h = (m.total / maxMonth) * 100;
          const [y, mo] = m.month.split('-');
          const lbl = new Date(y, mo - 1).toLocaleDateString('es-ES', { month: 'short' });
          const isMax = m.total === maxMonth && m.total > 0;
          return `<div class="bar-col"><div class="bar-val">${m.total ? fmtEur(m.total) : ''}</div><div class="bar${isMax ? ' bar-top' : ''}" style="height:${h}%;animation-delay:${i * 45}ms" title="${fmtEur(m.total)}"></div><div class="bar-label">${lbl}</div></div>`;
        })
        .join('')
    : '<p class="muted">Sin datos todavía.</p>';

  const catEntries = Object.entries(s.byCategory).sort((a, b) => b[1] - a[1]);
  const catsTotal = catEntries.reduce((a, c) => a + c[1], 0);
  const cats = donutHTML(catEntries, catsTotal, lab);

  // Presupuesto mensual: gasto del mes en curso (repostajes + gastos) del
  // vehículo activo frente al límite configurado en Ajustes.
  let budgetHtml = '';
  const budget = Number(prefs.budget_month) || 0;
  if (budget > 0) {
    const curMonth = todayISO().slice(0, 7);
    const spent = (s.monthlySeries.find((m) => m.month === curMonth) || {}).total || 0;
    const pct = Math.round((spent / budget) * 100);
    const lvl = spent > budget ? 'over' : pct >= 80 ? 'warn' : '';
    const monthName = new Date().toLocaleDateString('es-ES', { month: 'long' });
    budgetHtml = `<div class="card">
      <h3>${ic('wallet')} Presupuesto de ${monthName}</h3>
      <div class="budget-head"><span>${fmtEur(spent)} de ${fmtEur(budget)}</span><span class="chip ${spent > budget ? 'overdue' : pct >= 80 ? 'due' : 'ok'}">${spent > budget ? 'Superado' : pct + '%'}</span></div>
      <div class="budget-track"><div class="budget-fill ${lvl}" style="width:${Math.max(2, Math.min(100, pct))}%"></div></div>
      <p class="muted" style="margin:8px 0 0;font-size:12.5px">${spent > budget ? `Has superado el presupuesto en ${fmtEur(spent - budget)}.` : `Quedan ${fmtEur(budget - spent)} este mes.`}</p>
    </div>`;
  } else {
    budgetHtml = `<div class="card">
      <h3>${ic('wallet')} Presupuesto mensual</h3>
      <p class="muted" style="margin:0;font-size:13px">Fija un límite de gasto mensual en Ajustes → Unidades y moneda para ver aquí el progreso del mes.</p>
    </div>`;
  }

  const dueHtml = dueReminders.length
    ? `<div class="card"><h3>${ic('bell')} Avisos de mantenimiento</h3><div class="list">${dueReminders
        .map((r) => {
          const st = reminderStatus(r, s.maxOdo);
          return `<div class="item"><div class="item-icon">${ic('wrench')}</div><div class="item-main">
            <div class="item-title">${esc(r.title)}</div>
            <div class="item-sub">${st.label} <span class="chip ${st.status}">${st.badge}</span></div>
          </div></div>`;
        })
        .join('')}</div></div>`
    : '';

  // Graficas de evolucion: precio unitario y consumo
  const pricePoints = timeline
    .filter((t) => t.price_per_l != null && t.price_per_l > 0)
    .map((t) => ({ date: t.date, value: lab.priceToDisp(t.price_per_l) }));
  const consPoints = timeline
    .filter((t) => t.consumption != null)
    .map((t) => ({ date: t.date, value: lab.consToDisp(t.consumption) }));
  const priceChart = lineChart(pricePoints, { unit: lab.price });
  const consChart = lineChart(consPoints, { unit: lab.cons });
  const priceHtml = priceChart ? `<div class="card"><h3>Evolución del precio (${lab.price})</h3>${priceChart}</div>` : '';
  const consHtml = consChart ? `<div class="card"><h3>Evolución del consumo (${lab.cons})</h3>${consChart}</div>` : '';

  // Comparativa real entre vehiculos (con >= 2 vehiculos con datos)
  let compareHtml = '';
  if (compare.length >= 2) {
    const vicon = (c) => (c.fuel_type === 'electrico' ? ic('bolt') : ic('fuel'));
    const maxE = Math.max(...compare.map((c) => c.energyCostPerKm));
    const rows = compare
      .slice()
      .sort((a, b) => a.energyCostPerKm - b.energyCostPerKm)
      .map(
        (c) => `<div class="cat-row">
          <div class="cat-name">${vicon(c)} ${esc(c.name)}</div>
          <div class="cat-track"><div class="cat-fill" style="width:${(c.energyCostPerKm / maxE) * 100}%"></div></div>
          <div class="cat-val">${num2.format((c.energyCostPerKm / dU().f) * 100)} ${curSym}/100${dU().u}</div>
        </div>`
      )
      .join('');

    // Ahorro real: el EV seleccionado frente a tu vehiculo de combustion con mas datos
    let realSavings = '';
    const me = compare.find((c) => c.id === v.id && c.fuel_type === 'electrico');
    const comb = compare
      .filter((c) => c.fuel_type !== 'electrico')
      .sort((a, b) => b.distance - a.distance)[0];
    if (me && comb) {
      const per100me = (me.energyCostPerKm / dU().f) * 100;
      const per100comb = (comb.energyCostPerKm / dU().f) * 100;
      const diff = comb.energyCostPerKm - me.energyCostPerKm;
      const per100 = (diff / dU().f) * 100;
      const per10k = (diff / dU().f) * 10000;
      realSavings = `<div class="real-savings ${diff >= 0 ? 'pos' : 'neg'}">
        ${diff >= 0
          ? `🌱 Con tus datos reales, <strong>${esc(me.name)}</strong> (${num2.format(per100me)} ${curSym}/100${dU().u}) frente a <strong>${esc(comb.name)}</strong> (${num2.format(per100comb)} ${curSym}/100${dU().u}): ahorras <strong>${eur.format(per100)}</strong> cada 100 ${dU().u} ≈ <strong>${eur.format(per10k)}</strong> cada 10.000 ${dU().u}.`
          : `⚠️ Con tus datos reales, <strong>${esc(me.name)}</strong> te está costando <strong>${eur.format(-per100)}</strong> más cada 100 ${dU().u} que <strong>${esc(comb.name)}</strong>.`}
      </div>`;
    }
    compareHtml = `<div class="card"><h3>Comparativa real de tu garaje · coste energético</h3>${rows}${realSavings}
      <p class="muted" style="margin:10px 0 0;font-size:12px">Calculado con tus repostajes/recargas reales (energía entre distancia recorrida).</p></div>`;
  }

  // Insights: autonomía, gasto proyectado, CO2, anomalías.
  const insightsHtml = buildInsights(s, lab);

  // Solo las secciones que el usuario haya elegido mostrar (Ajustes → Pantalla principal).
  const on = dashEnabledSet();
  const statsHtml = `<div class="grid stats-grid">${stats.map(([l, val, cls]) => `<div class="stat${cls ? ' ' + cls : ''}"><div class="label">${l}</div><div class="value">${val}</div></div>`).join('')}</div>`;
  const monthlyHtml = `<div class="card"><h3>Gasto mensual (últimos 12 meses)</h3><div class="bars">${bars}</div></div>`;
  const categoriesHtml = `<div class="card"><h3>Gasto por categoría</h3>${cats}</div>`;
  const sec = {
    stats: statsHtml, budget: budgetHtml, ev: evHtml, insights: insightsHtml, compare: compareHtml,
    reminders: dueHtml, priceChart: priceHtml, consChart: consHtml, monthly: monthlyHtml, categories: categoriesHtml,
  };
  const body = DASH_SECTIONS.map(([id]) => (on.has(id) ? sec[id] || '' : '')).join('');

  // Banner "hero": identidad del vehículo + cifra destacada + autonomía.
  const nf = s.insights && s.insights.nextFuel;
  const gaugeHtml = rangeAlertOn() && nf && nf.pctRemaining != null ? (() => {
    const pct = Math.max(2, Math.min(100, nf.pctRemaining));
    const lvl = nf.pctRemaining <= 15 ? 'low' : nf.pctRemaining <= 35 ? 'mid' : '';
    return `<div class="hero-gauge">
      <div class="hg-head"><span>${lab.ev ? 'Batería' : 'Depósito'} ~${nf.pctRemaining}%</span><span>${fmtKm(nf.kmRemaining)} hasta ${lab.ev ? 'recargar' : 'repostar'}</span></div>
      <div class="hg-track"><div class="hg-fill ${lvl}" style="width:${pct}%"></div></div>
    </div>`;
  })() : '';
  const heroHtml = `<div class="hero-card">
    <div class="hero-glow"></div>
    <div class="hero-top">
      <span class="hero-veh">${lab.ev ? ic('bolt') : ic('fuel')}<span>${esc(v.name)}</span></span>
      ${v.plate ? `<span class="hero-plate">${esc(v.plate)}</span>` : ''}
    </div>
    <div class="hero-val">${fmtEur(s.totalCost)}</div>
    <div class="hero-lbl">Gasto total${s.distance ? ' · ' + fmtKm(s.distance) : ''}</div>
    ${gaugeHtml}
    <div class="hero-stats">
      <div><span class="hs-v">${s.costPerKm != null ? eur.format(s.costPerKm / dU().f) : '—'}</span><span class="hs-l">Coste / ${dU().u}</span></div>
      <div><span class="hs-v">${s.overallConsumption != null ? num1.format(lab.consToDisp(s.overallConsumption)) : '—'}</span><span class="hs-l">${lab.cons}</span></div>
      <div><span class="hs-v">${num0.format(s.fillCount)}</span><span class="hs-l">${lab.section}</span></div>
    </div>
  </div>`;

  // Aviso de copia de seguridad pendiente (>30 días o nunca).
  const backupHtml = backupDue() ? `<div class="card backup-warn">
    <h3>${ic('download')} Copia de seguridad pendiente</h3>
    <p class="muted" style="margin:0 0 12px;font-size:13px">${(() => { try { return localStorage.getItem('sc_last_backup') ? 'Hace más de 30 días de tu última copia.' : 'Aún no has hecho ninguna copia de seguridad.'; } catch (e) { return 'Hace tiempo de tu última copia.'; } })()} Si pierdes o cambias de móvil, tus datos no se pueden recuperar sin ella.</p>
    <div class="row-btns">
      <button class="btn btn-sm btn-primary" onclick="exportBackup()">${ic('download')} Hacer copia ahora</button>
      <button class="btn btn-sm" onclick="snoozeBackup()">Recordar en 7 días</button>
    </div>
  </div>` : '';

  el.innerHTML = `
    <div class="section-title"><h2>Resumen</h2><div class="row-btns"><button class="btn btn-sm" onclick="openCompareReport()">${ic('scale')} Comparar</button><button class="btn btn-sm" onclick="openReport()">${ic('file')} Informe</button></div></div>
    ${backupHtml}
    ${heroHtml}
    ${body || emptyState({ icon: 'monitor', title: 'Resumen vacío', sub: 'No hay ninguna tarjeta seleccionada. Elige qué mostrar en Ajustes → Pantalla principal.' })}
  `;
  initChartHovers(el);
}

// Construye la tarjeta de predicciones e impacto (insights).
function buildInsights(s, lab) {
  const i = s.insights;
  if (!i) return '';
  const tiles = [];

  if (i.nextFuel && rangeAlertOn()) {
    const nf = i.nextFuel;
    const cls = nf.pctRemaining != null && nf.pctRemaining <= 15 ? 'warn' : '';
    tiles.push(`<div class="insight ${cls}">
      <div class="insight-ico">${lab.ev ? ic('plug') : ic('fuel')}</div>
      <div><div class="insight-v">${fmtKm(nf.kmRemaining)}${nf.pctRemaining != null ? ` · ${nf.pctRemaining}%` : ''}</div>
      <div class="insight-k">para ${lab.ev ? 'recargar' : 'repostar'}${nf.daysRemaining != null ? ` · ~${nf.daysRemaining} días` : ''}</div></div></div>`);
  }
  if (i.projectedMonthly != null) {
    tiles.push(`<div class="insight"><div class="insight-ico">${ic('trending')}</div>
      <div><div class="insight-v">${fmtEur(i.projectedMonthly)}</div><div class="insight-k">gasto estimado / mes</div></div></div>`);
  }
  if (i.avgDailyKm != null) {
    tiles.push(`<div class="insight"><div class="insight-ico">${ic('route')}</div>
      <div><div class="insight-v">${fmtKm(i.avgDailyKm)}</div><div class="insight-k">de media al día</div></div></div>`);
  }
  if (i.co2Emitted != null) {
    tiles.push(`<div class="insight"><div class="insight-ico">${ic('leaf')}</div>
      <div><div class="insight-v">${num0.format(i.co2Emitted)} kg</div><div class="insight-k">CO₂ emitido${s.isEV ? ' (recarga)' : ''}</div></div></div>`);
  }
  if (s.isEV && i.co2Saved != null && i.co2Saved > 0) {
    tiles.push(`<div class="insight ok"><div class="insight-ico">${ic('leaf')}</div>
      <div><div class="insight-v">${num0.format(i.co2Saved)} kg</div><div class="insight-k">CO₂ ahorrado vs. combustión</div></div></div>`);
  }

  let anomHtml = '';
  if (i.anomalies && i.anomalies.length) {
    anomHtml = `<div class="anomaly"><strong>⚠️ Consumos atípicos detectados</strong> (mediana ${num1.format(lab.consToDisp(i.consumptionMedian))} ${lab.cons}):
      <ul>${i.anomalies
        .slice(-4)
        .map((a) => `<li>${fmtDate(a.date)}: ${num1.format(lab.consToDisp(a.consumption))} ${lab.cons} <span class="chip ${a.deviation > 0 ? 'overdue' : 'ok'}">${a.deviation > 0 ? '+' : ''}${a.deviation}%</span></li>`)
        .join('')}</ul>
      <span class="muted">Revisa posibles errores de tecleo o incidencias (presión, filtros, conducción).</span></div>`;
  }

  if (!tiles.length && !anomHtml) return '';
  return `<div class="card"><h3>🔮 Predicciones e impacto</h3>
    <div class="insight-grid">${tiles.join('')}</div>${anomHtml}</div>`;
}

const yearsOf = (arr) => [...new Set(arr.map((x) => (x.date || '').slice(0, 4)).filter(Boolean))].sort().reverse();
const yearOpts = (years, sel) => `<option value="">Todos los años</option>${years.map((y) => `<option value="${y}" ${y === sel ? 'selected' : ''}>${y}</option>`).join('')}`;
const emptyFiltered = () => '<div class="empty"><p class="muted">Nada coincide con el filtro.</p></div>';

const chipsHTML = (opts, active) =>

function wireChips(container, onSelect) {
  if (!container) return;
  $$('.chip-f', container).forEach((b) =>
    b.addEventListener('click', () => {
      $$('.chip-f', container).forEach((x) => x.classList.remove('on'));

let fuelCache = [];
let fuelLab = null;
let fuelSpark = {};
// Mini-gráfica de consumo: para cada repostaje, la ventana de los últimos ~6.
function buildFuelSpark() {
  fuelSpark = {};
  const chrono = fuelCache.filter((f) => f.consumption != null)
    .sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.odometer - b.odometer));
  chrono.forEach((f, idx) => { fuelSpark[f.id] = chrono.slice(Math.max(0, idx - 5), idx + 1).map((x) => x.consumption); });
}
function sparkline(vals) {
  if (!vals || vals.length < 2) return '';
  const w = 52, h = 16, pad = 2;
  const min = Math.min(...vals), max = Math.max(...vals), rng = (max - min) || 1;
  const X = (i) => pad + (i / (vals.length - 1)) * (w - 2 * pad);
  const Y = (val) => pad + (1 - (val - min) / rng) * (h - 2 * pad);
  const d = vals.map((val, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)},${Y(val).toFixed(1)}`).join('');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true"><path d="${d}"/><circle cx="${X(vals.length - 1).toFixed(1)}" cy="${Y(vals[vals.length - 1]).toFixed(1)}" r="1.7"/></svg>`;
}
// Control colapsable de filtro por rango de fechas.
function dateRangeHTML(kind) {
  const f = state.filters[kind];
  const open = f.from || f.to ? ' open' : '';
  return `<details class="filter-more"${open}>
    <summary>${ic('calendar')} Filtrar por fecha</summary>
    <div class="daterange">
      <label>Desde<input type="date" id="${kind}-from" value="${f.from || ''}"></label>
      <label>Hasta<input type="date" id="${kind}-to" value="${f.to || ''}"></label>
      <button type="button" class="btn btn-sm" id="${kind}-range-clear">Limpiar</button>
    </div>
  </details>`;
}
function wireDateRange(kind, repaint) {
  const from = $(`#${kind}-from`), to = $(`#${kind}-to`), clr = $(`#${kind}-range-clear`);
  if (from) from.addEventListener('change', (e) => { state.filters[kind].from = e.target.value; repaint(); });
  if (to) to.addEventListener('change', (e) => { state.filters[kind].to = e.target.value; repaint(); });
  if (clr) clr.addEventListener('click', () => { state.filters[kind].from = ''; state.filters[kind].to = ''; if (from) from.value = ''; if (to) to.value = ''; repaint(); });
}
const inDateRange = (dateStr, f) => {
  const d = dateStr || '';
  if (f.from && d < f.from) return false;
  if (f.to && d > f.to) return false;
  return true;
};

const recurLabel = (m) => ({ 1: 'mensual', 3: 'trimestral', 6: 'semestral', 12: 'anual' }[m] || `cada ${m} meses`);
const addMonthsToDate = (dateStr, months) => {
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return null;
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0, 10);
};
// Motor de gastos recurrentes: al abrir, crea las repeticiones ya vencidas.
// Solo la ocurrencia más reciente de una serie conserva recur_months.
async function processRecurringExpenses() {
  let created = 0;
  const today = todayISO();
  try {
    for (const v of state.vehicles) {
      const expenses = await api('GET', `/vehicles/${v.id}/expenses`);
      const templates = expenses.filter((e) => e.recur_months && e.recur_months > 0);
      for (const tmpl of templates) {
        let curDate = tmpl.date, lastId = tmpl.id, guard = 0;
        const months = tmpl.recur_months;
        while (guard++ < 60) {
          const next = addMonthsToDate(curDate, months);
          if (!next || next > today) break;
          const row = await api('POST', `/vehicles/${v.id}/expenses`, {
            date: next, title: tmpl.title, category: tmpl.category, cost: tmpl.cost,
            notes: tmpl.notes, odometer: null, recur_months: months,
          });
          await api('PUT', '/expenses/' + lastId, { recur_months: null });
          lastId = row && row.id ? row.id : lastId;
          curDate = next; created++;
        }
      }
    }
  } catch (e) { /* silencioso: no bloquea el arranque */ }
  if (created) toast(`Creado(s) ${created} gasto(s) recurrente(s)`);
  return created;
}
function expItemHTML(e) {
  const hasReceipt = expReceiptKeys.has('e' + e.id);
  return `<div class="item item-tap" data-id="${e.id}" data-kind="expense" onclick="itemMenu('expense',${e.id})">
    <div class="item-icon">${catIco(e.category)}</div>

      <div class="item-sub">${fmtDate(e.date)} · ${catName(e.category)}${e.odometer != null ? ' · ' + fmtKm(e.odometer) : ''}${e.recur_months ? ` <span class="chip">${ic('undo')} ${recurLabel(e.recur_months)}</span>` : ''}</div>

    </div>
    <div class="item-amount">${fmtEur(e.cost)}<span class="item-chev">›</span></div>
  </div>`;
}
function paintExpenses(resetPage = true) {
  if (resetPage) listShown.expenses = LIST_PAGE;
  const f = state.filters.expenses;
  const q = f.q.trim().toLowerCase();
  const list = expCache.filter((x) => {
    if (f.cat && x.category !== f.cat) return false;
    if (f.year && !(x.date || '').startsWith(f.year)) return false;
    if (!inDateRange(x.date, f)) return false;
    if (q && !`${x.title || ''} ${x.notes || ''} ${catName(x.category)}`.toLowerCase().includes(q)) return false;
    return true;
  });

  const cnt = $('#exp-count');
  if (cnt) cnt.textContent = (list.length === expCache.length ? String(expCache.length) : `${list.length}/${expCache.length}`) + ` · ${fmtEur(total)}`;
  $('#list-exp').innerHTML = list.length ? pagedListHTML('expenses', list, expItemHTML) : emptyFiltered();
}

  let status = 'ok';
  if (r.due_date) {
    const days = Math.round((new Date(r.due_date) - new Date(todayISO())) / 86400000);
    parts.push(fmtDate(r.due_date));
    if (days < 0) status = 'overdue';
    else if (days <= 30 && status !== 'overdue') status = 'due';
  }
  if (r.due_odo != null && r.due_odo > 0 && currentOdo != null) {
    const km = r.due_odo - currentOdo;
    parts.push(`a ${fmtKm(r.due_odo)}`);
    if (km < 0) status = 'overdue';
    else if (km <= 1000 && status !== 'overdue') status = 'due';
  }
  const badge = status === 'overdue' ? 'Vencido' : status === 'due' ? 'Próximo' : 'OK';
  return { status, label: parts.join(' · ') || 'Sin fecha', badge };
}

function remItemHTML(r) {

    </div>
    <div class="item-amount"><span class="item-chev">›</span></div>
  </div>`;
}
function paintReminders() {
  const f = state.filters.reminders;
  const q = f.q.trim().toLowerCase();
  const list = remCache.filter((r) => {
    if (f.status === 'done' && !r.done) return false;
    if (f.status === 'pending' && r.done) return false;
    if ((f.status === 'overdue' || f.status === 'due') && (r.done || reminderStatus(r, remMaxOdo).status !== f.status)) return false;
    if (q && !`${r.title || ''} ${r.notes || ''}`.toLowerCase().includes(q)) return false;
    return true;
  });
  $('#list-rem').innerHTML = list.length ? list.map(remItemHTML).join('') : emptyFiltered();
}

// Resumen combinado de todos los vehículos del garaje.
async function garageSummaryHTML() {
  const stats = await Promise.all(state.vehicles.map((v) => api('GET', `/vehicles/${v.id}/stats`).catch(() => null)));
  const rows = state.vehicles.map((v, i) => ({ v, s: stats[i] })).filter((r) => r.s);
  if (!rows.length) return '';
  const totalCost = rows.reduce((a, r) => a + (r.s.totalCost || 0), 0);
  const totalDist = rows.reduce((a, r) => a + (r.s.distance || 0), 0);
  const active = state.vehicles.filter((v) => v.active).length;
  const ranked = rows.filter((r) => r.s.costPerKm != null && r.s.distance > 0).sort((a, b) => b.s.costPerKm - a.s.costPerKm);
  const maxCPK = ranked.length ? ranked[0].s.costPerKm : 1;
  const barRows = ranked.map((r) => `<div class="cat-row">
      <div class="cat-name">${isEV(r.v) ? ic('bolt') : ic('fuel')} ${esc(r.v.name)}</div>
      <div class="cat-track"><div class="cat-fill" style="width:${(r.s.costPerKm / maxCPK) * 100}%"></div></div>
      <div class="cat-val">${eur.format(r.s.costPerKm / dU().f)}/${dU().u}</div>
    </div>`).join('');
  const stat = (l, val) => `<div class="stat"><div class="label">${l}</div><div class="value">${val}</div></div>`;
  const priciest = ranked[0], cheapest = ranked[ranked.length - 1];
  return `<div class="card">
    <h3>${ic('car')} Resumen del garaje</h3>
    <div class="grid stats-grid">
      ${stat('Vehículos', num0.format(state.vehicles.length) + (active < state.vehicles.length ? ` <small>${active} activos</small>` : ''))}
      ${stat('Gasto total', fmtEur(totalCost))}
      ${stat('Distancia total', fmtKm(totalDist))}
      ${stat(`Coste medio / ${dU().u}`, totalDist > 0 ? eur.format(totalCost / totalDist / dU().f) : '—')}
    </div>
    ${barRows ? `<div style="margin-top:14px"><div class="muted" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Coste total por ${dU().u}</div>${barRows}</div>` : ''}
    ${priciest && cheapest && priciest !== cheapest ? `<p class="muted" style="font-size:12.5px;margin:10px 0 0">Más caro: <strong>${esc(priciest.v.name)}</strong> · Más económico: <strong>${esc(cheapest.v.name)}</strong></p>` : ''}
  </div>`;
}

// Hojas inferiores (bottom sheet): acciones y confirmaciones táctiles
// ---------------------------------------------------------------------------
function closeSheet() {
  const s = $('#sheet');
  if (s) {
    s.classList.add('closing');
    setTimeout(() => s.remove(), 200);
  }
}
function openSheet(innerHTML) {
  closeSheet();
  const s = document.createElement('div');
  s.id = 'sheet';
  s.className = 'sheet';
  s.innerHTML = `<div class="sheet-backdrop"></div><div class="sheet-card" role="dialog" aria-modal="true">${innerHTML}</div>`;
  document.body.appendChild(s);
  $('.sheet-backdrop', s).addEventListener('click', closeSheet);
  // Lleva el foco a la hoja para que teclado y lectores de pantalla entren en ella.
  const fb = $('.sheet-card button', s);
  if (fb) try { fb.focus(); } catch (e) {}
  return s;
}
// actions: [{ label, icon, danger, cb }]
function actionSheet(title, actions) {
  haptic(8);
  const s = openSheet(
    `${title ? `<div class="sheet-title">${esc(title)}</div>` : ''}
     <div class="sheet-actions">${actions
       .map((a, i) => `<button class="sheet-btn ${a.danger ? 'danger' : ''}" data-i="${i}"><span class="sheet-ico">${a.icon || ''}</span>${esc(a.label)}</button>`)
       .join('')}</div>
     <button class="sheet-btn sheet-cancel">Cancelar</button>`
  );
  $$('.sheet-actions .sheet-btn', s).forEach((btn) =>
    btn.addEventListener('click', () => {
      const a = actions[+btn.dataset.i];
      closeSheet();
      haptic(10);
      setTimeout(() => a.cb && a.cb(), 60);
    })
  );
  $('.sheet-cancel', s).addEventListener('click', closeSheet);
}
// Confirmación en hoja inferior. Devuelve una promesa que resuelve true/false.
function confirmSheet(message, { okLabel = 'Confirmar', danger = true } = {}) {
  return new Promise((resolve) => {
    const s = openSheet(
      `<div class="sheet-confirm">${esc(message)}</div>
       <div class="sheet-confirm-actions">
         <button class="btn sheet-no">Cancelar</button>
         <button class="btn ${danger ? 'btn-danger-solid' : 'btn-primary'} sheet-yes">${esc(okLabel)}</button>
       </div>`
    );
    let done = false;
    const finish = (val) => { if (done) return; done = true; closeSheet(); resolve(val); };
    $('.sheet-yes', s).addEventListener('click', () => { haptic(12); finish(true); });
    $('.sheet-no', s).addEventListener('click', () => finish(false));
    $('.sheet-backdrop', s).addEventListener('click', () => finish(false));
  });
}

// Modal genérico
// ---------------------------------------------------------------------------
let modalSubmit = null;
// Borradores: si un modal de alta se cierra sin guardar, lo escrito se conserva
// en memoria y se repone al reabrirlo (con opción de descartar).
const modalDrafts = {};
let currentDraftKey = null;
function saveModalDraft() {
  if (!currentDraftKey) return;
  const form = $('#modal-form');
  const vals = {};
  let any = false;
  form.querySelectorAll('input[name], select[name], textarea[name]').forEach((el) => {
    if (el.type === 'file') return;
    if (el.type === 'checkbox') { vals['#' + el.name] = el.checked; return; }
    vals[el.name] = el.value;
    if (el.value !== '' && el.value !== el.defaultValue) any = true; // solo si escribió algo
  });
  if (any) modalDrafts[currentDraftKey] = vals;
}
function applyModalDraft(key) {
  const d = modalDrafts[key];
  if (!d) return;
  const form = $('#modal-form');
  for (const [k, val] of Object.entries(d)) {
    if (k.startsWith('#')) { const c = form.querySelector(`input[name="${k.slice(1)}"]`); if (c) c.checked = val; continue; }
    const el = form.querySelector(`[name="${k}"]`);
    if (el) el.value = val;
  }
  const note = document.createElement('div');
  note.className = 'draft-note';
  note.innerHTML = `<span>${ic('undo')} Recuperado lo que escribiste</span><button type="button" class="btn btn-sm">Descartar</button>`;
  form.prepend(note);
  note.querySelector('button').addEventListener('click', () => {
    delete modalDrafts[key];
    form.reset(); // vuelve a los valores iniciales del formulario
    note.remove();
  });
}
let modalLastFocus = null; // a quién devolver el foco al cerrar (teclado/TalkBack)
function openModal(title, fieldsHtml, onSubmit, draftKey) {
  modalLastFocus = document.activeElement;
  $('#modal-title').textContent = title;
  $('#modal-form').innerHTML =
    fieldsHtml +
    `<div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>`;
  modalSubmit = onSubmit;
  currentDraftKey = draftKey || null;
  if (currentDraftKey) applyModalDraft(currentDraftKey);
  $('#modal').classList.remove('hidden');
  const first = $('#modal-form input, #modal-form select');
  if (first && matchMedia('(min-width: 640px)').matches) first.focus(); // en movil evita abrir el teclado de golpe
}
function closeModal() {
  saveModalDraft(); // conserva lo escrito si se cerró sin guardar
  currentDraftKey = null;
  $('#modal').classList.add('hidden');
  modalSubmit = null;
  try { if (modalLastFocus && modalLastFocus.focus && document.contains(modalLastFocus)) modalLastFocus.focus(); } catch (e) {}
  modalLastFocus = null;
}

// Mantiene el foco dentro del modal o la hoja abiertos (accesibilidad).
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Tab') return;
  const box = $('#sheet .sheet-card') || (!$('#modal').classList.contains('hidden') ? $('#modal .modal-card') : null);
  if (!box) return;
  const foc = $$('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])', box)
    .filter((x) => !x.disabled && x.offsetParent !== null);
  if (!foc.length) return;
  const first = foc[0], last = foc[foc.length - 1];
  if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
  else if (!e.shiftKey && (document.activeElement === last || !box.contains(document.activeElement))) { first.focus(); e.preventDefault(); }
});
$('#modal-close').addEventListener('click', closeModal);
$('.modal-backdrop').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !$('#modal').classList.contains('hidden')) closeModal();
});

// Botón "atrás" de Android (llamado desde el APK): cierra lo que haya abierto o
// vuelve al Resumen; solo devuelve false (salir) si ya estamos en el Resumen.
window.__handleBack = function () {
  const onb = $('#onboard'); if (onb) { (onb.__onbFinish || (() => onb.remove()))(); return true; }
  const lb = $('#lightbox'); if (lb) { lb.remove(); return true; }
  const so = $('#search-overlay'); if (so) { so.remove(); return true; }
  if ($('#sheet')) { closeSheet(); return true; }
  if (!$('#modal').classList.contains('hidden')) { closeModal(); return true; }
  const rep = $('#report-overlay'); if (rep) { rep.remove(); return true; }
  if (window.__nativeVoiceActive && window.AndroidVoice) { try { window.AndroidVoice.stop(); } catch (e) {} return true; }
  if (state.activeTab && state.activeTab !== 'dashboard') {
    switchTab('dashboard');
    return true;
  }
  return false;
};

          ${kpi('Consumo medio', avgCons != null ? num1.format(lab.consToDisp(avgCons)) + ' ' + lab.cons : '—')}

          </div>

    $('#rp-year').addEventListener('change', (e) => draw(e.target.value));

// ---- Informe de kilometraje (viajes) --------------------------------------
function downloadFile(filename, text, mime = 'text/csv;charset=utf-8') {
  const blob = new Blob(['﻿' + text], { type: mime }); // BOM para Excel
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}
const csvCell = (v) => {
  const s = v == null ? '' : String(v);
  return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
};
// Imprimir / guardar en PDF el informe visible: el WebView del APK no implementa
// window.print(), así que ahí se usa el diálogo de impresión nativo (AndroidPrint).
window.printReport = (title) => {
  if (window.AndroidPrint && typeof window.AndroidPrint.print === 'function') {
    try { window.AndroidPrint.print(title || 'SolutionCar'); return; } catch (e) {}
  }
  try { window.print(); } catch (e) { toast('Impresión no disponible aquí', true); }
};

// Compartir vía hoja de Android (APK) o Web Share API; si no, descarga/toast.
const androidShare = () => (window.AndroidShare && typeof window.AndroidShare.text === 'function') ? window.AndroidShare : null;
function shareCSV(filename, csv, subject) {
  const s = androidShare();
  if (s && s.file) { s.file(filename, 'text/csv', '﻿' + csv); return; }
  if (navigator.share) { navigator.share({ title: subject || filename, text: csv }).catch(() => {}); return; }
  downloadFile(filename, csv);
}
function shareText(subject, body) {
  const s = androidShare();
  if (s) { s.text(subject, body); return; }
  if (navigator.share) { navigator.share({ title: subject, text: body }).catch(() => {}); return; }
  try { navigator.clipboard.writeText(body); toast('Informe copiado al portapapeles'); }
  catch (e) { toast('Compartir no disponible aquí', true); }
}
function tripsToCSV(trips) {
  const head = ['Fecha inicio', 'Hora', 'Origen', 'Destino', 'Categoría', 'Odo inicial (' + dU().u + ')', 'Odo final (' + dU().u + ')', 'Distancia (' + dU().u + ')', 'Coste/' + dU().u + ' (' + prefs.currency + ')', 'Coste (' + prefs.currency + ')', 'Título', 'Nota'];
  const rows = trips.map((t) => {
    const dist = tripDistance(t);
    return [
      t.start_date || '', t.start_time || '', t.origin || '', t.destination || '', tripCatLabelText(t.category),
      t.start_odo != null ? round2(kmToDisp(t.start_odo)) : '', t.end_odo != null ? round2(kmToDisp(t.end_odo)) : '',
      dist != null ? round2(kmToDisp(dist)) : '', t.cost_per_km != null ? round3(t.cost_per_km / dU().f) : '',
      t.trip_cost != null ? round2(t.trip_cost) : '', t.title || '', t.notes || '',
    ].map(csvCell).join(';');
  });
  return [head.join(';'), ...rows].join('\n');
}
window.exportTripsCSV = function (trips, vname) {

};

// ---- Comparador de periodos (año vs. año) ----------------------------------
function yearStats(fuel, expenses, year, v, lab) {
  const fy = fuel.filter((f) => (f.date || '').startsWith(year));
  const ey = expenses.filter((e) => (e.date || '').startsWith(year));
  const fuelCost = fy.reduce((s, f) => s + (f.total_cost || 0), 0);
  const energy = fy.reduce((s, f) => s + (f.liters || 0), 0);
  const other = ey.reduce((s, e) => s + (e.cost || 0), 0);
  const total = fuelCost + other;
  const odos = fy.map((f) => f.odometer).filter((x) => x != null);
  const distance = odos.length ? Math.max(...odos) - Math.min(...odos) : 0;
  const cons = fy.map((f) => f.consumption).filter((c) => c != null);
  const avgCons = cons.length ? cons.reduce((a, b) => a + b, 0) / cons.length : null;
  const co2 = lab.ev ? energy * (prefs.co2_grid || 0.25) : energy * (CO2_L[v.fuel_type] || CO2_L.gasolina);
  return { fuelCost, energy, other, total, distance, avgCons, co2, fills: fy.length, costPerKm: distance > 0 ? total / distance : null };
}

// Voz nativa de Android (puente) o Web Speech API del navegador.
const nativeVoice = () => (window.AndroidVoice && typeof window.AndroidVoice.start === 'function' && (!window.AndroidVoice.isAvailable || window.AndroidVoice.isAvailable())) ? window.AndroidVoice : null;
const speechSupported = () => !!nativeVoice() || 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;

// Interpreta una frase dictada en un repostaje o recarga (combustión y eléctrico):
// odómetro, litros/kWh, precio, coste, gasolinera/punto de recarga y lleno/parcial.
function parseFuelSpeech(text) {
  let t = ' ' + text.toLowerCase() + ' ';
  t = t.replace(/€/g, ' euros ').replace(/\bcoma\b/g, '.').replace(/\bpunto\b/g, '.');
  t = t.replace(/kilo\s*vatios?(?:\s*hora)?|kilovatios?(?:\s*hora)?|kw\s*h|kv\b/g, ' kwh '); // unifica energía eléctrica
  t = t.replace(/(\d),(\d)/g, '$1.$2'); // decimal con coma (sin espacios: 1,65 -> 1.65)
  t = t.replace(/,/g, ' '); // comas restantes = separadores de lista
  t = t.replace(/(\d)\.(\d{3})(?!\d)/g, '$1$2'); // separador de miles con punto (125.300 -> 125300)
  const N = '(\\d+(?:\\.\\d+)?)';
  const UNIT = '(?:litros?|lts?|kwh|l)'; // unidad de energía (litros o kWh)
  const PU = '(?:litro|kwh)'; // unidad para el precio (por litro / por kWh)
  const out = {};

  // Lleno / parcial (sobre el texto original, antes de consumir números).
  if (/\b(?:lleno|llena|completo|completa|full|hasta arriba|a tope)\b/.test(t)) out.full = true;
  else if (/\b(?:parcial|media carga|a medias|no lleno|no completo)\b/.test(t)) out.full = false;

  // Gasolinera / punto de recarga (necesita una pista para no confundir palabras sueltas).
  const st = t.match(/(?:gasolinera|estaci[oó]n|punto de recarga|cargador|repostado en|cargado en|recarga en|en la|en el)\s+([a-záéíóúñ]{2,}(?:\s+[a-záéíóúñ]{2,})?)/);
  if (st) out.station = st[1].trim();

  const grab = (re) => { const m = t.match(re); if (m) { t = t.replace(m[0], ' '); return m[1]; } return null; };
  // Precio por unidad (tiene contexto "por litro" / "el kWh")
  out.price_per_l =
    grab(new RegExp('(?:precio|a)\\s*' + N + '\\s*(?:euros?\\s*)?(?:el|por)\\s*' + PU)) ||
    grab(new RegExp(N + '\\s*(?:euros?\\s*)?(?:el|por)\\s*' + PU));
  // Energía: litros o kWh
  out.liters = grab(new RegExp(N + '\\s*' + UNIT + '\\b')) || grab(new RegExp('(?:litros?|kwh|carga|recarga|repostaje)\\s*' + N));
  // Coste total (euros o palabra clave)
  out.total_cost =
    grab(new RegExp('(?:total|coste|cost[eé]|import[eo]|pagu[eé]|he pagado)\\s*(?:de)?\\s*' + N)) ||
    grab(new RegExp(N + '\\s*(?:euros?|d[oó]lares?)\\b'));
  // Odómetro / kilómetros
  out.odometer =
    grab(new RegExp('(?:od[oó]metro|kilometraje|kil[oó]metros?|kms?|marca)\\s*(?:a|en|de|:)?\\s*' + N)) ||
    grab(new RegExp(N + '\\s*(?:kms?|kil[oó]metros?)\\b'));
  return out;
}

// Palabras clave para deducir la categoría de un gasto dictado.
const EXP_CAT_KW = [
  ['revision', ['itv', 'revisión', 'revision', 'inspección', 'inspeccion']],
  ['mantenimiento', ['mantenimiento', 'aceite', 'filtro', 'filtros', 'puesta a punto']],
  ['reparacion', ['reparación', 'reparacion', 'avería', 'averia', 'arreglo', 'taller']],
  ['neumaticos', ['neumático', 'neumaticos', 'neumáticos', 'rueda', 'ruedas', 'llanta', 'cubierta']],
  ['seguro', ['seguro']],
  ['impuesto', ['impuesto', 'circulación', 'circulacion']],
  ['lavado', ['lavado', 'lavar', 'limpieza', 'túnel de lavado']],
  ['peaje', ['peaje', 'autopista']],
  ['aparcamiento', ['aparcamiento', 'parking', 'párking', 'garaje']],
  ['multa', ['multa', 'sanción', 'sancion']],
  ['accesorios', ['accesorio', 'accesorios', 'complemento']],
];

// Interpreta una frase dictada en un gasto: concepto, importe, categoría, odómetro.
function parseExpenseSpeech(text) {
  let t = ' ' + text.toLowerCase() + ' ';
  t = t.replace(/€/g, ' euros ').replace(/\bcoma\b/g, '.').replace(/\bpunto\b/g, '.');
  t = t.replace(/(\d),(\d)/g, '$1.$2').replace(/,/g, ' ').replace(/(\d)\.(\d{3})(?!\d)/g, '$1$2');
  const N = '(\\d+(?:\\.\\d+)?)';
  const out = {};
  const grab = (re) => { const m = t.match(re); if (m) { t = t.replace(m[0], ' '); return m[1]; } return null; };
  out.cost = grab(new RegExp('(?:total|coste|cost[eé]|import[eo]|pagu[eé]|he pagado|precio)\\s*(?:de)?\\s*' + N)) || grab(new RegExp(N + '\\s*(?:euros?|d[oó]lares?)\\b'));
  out.odometer = grab(new RegExp('(?:od[oó]metro|kilometraje|kil[oó]metros?|kms?|marca)\\s*(?:a|en|de|:)?\\s*' + N)) || grab(new RegExp(N + '\\s*(?:kms?|kil[oó]metros?)\\b'));
  for (const [cat, kws] of EXP_CAT_KW) { if (kws.some((k) => t.includes(k))) { out.category = cat; break; } }
  // El concepto es lo que queda tras quitar cifras/unidades y palabras de relleno.
  let title = t.replace(/\b(?:total|coste|cost[eé]|import[eo]|pagu[eé]|he pagado|precio|euros?|d[oó]lares?|kms?|kil[oó]metros?|litros?|de|del|la|el|un|una|categor[ií]a)\b/g, ' ')
    .replace(/\d+(?:\.\d+)?/g, ' ').replace(/\s+/g, ' ').trim();
  if (title) out.title = title.charAt(0).toUpperCase() + title.slice(1);
  else if (out.category) out.title = catName(out.category);
  return out;
}

let fuelRecognition = null;
let voiceOrigText = '🎤 Dictar';
function voiceStart(btn, hint) { voiceOrigText = btn.textContent; btn.classList.add('listening'); btn.textContent = '● Escuchando… (toca para parar)'; if (hint) hint.textContent = 'Escuchando…'; }
function voiceStop(btn) { btn.classList.remove('listening'); btn.textContent = voiceOrigText; }
const voiceLang = () => (prefs.locale && prefs.locale.startsWith('en')) ? 'en-US' : 'es-ES';

// Fila con el botón 🎤 (se muestra solo si el dispositivo admite dictado).
function voiceRowHTML(kind, label, example) {
  if (!speechSupported()) return '';
  return `<div class="voice-row"><button type="button" class="btn voice-btn" id="voice-btn" onclick="startVoice('${kind}')">🎤 ${label}</button><div class="voice-hint muted" id="voice-hint">Di p. ej.: ${example}</div></div>`;
}

// Dictado por voz genérico: 'fuel' (repostaje/recarga) o 'expense' (gasto).
window.startVoice = function (kind) {
  const applyFn = kind === 'expense' ? applyExpenseTranscript : applyFuelTranscript;
  const hint = $('#voice-hint');
  const btn = $('#voice-btn');
  if (!speechSupported()) {
    if (hint) hint.textContent = 'Este dispositivo no admite dictado por voz.';
    return;
  }

  // 1) Voz NATIVA de Android (dentro del APK) mediante el puente AndroidVoice.
  const nv = nativeVoice();
  if (nv) {
    if (window.__nativeVoiceActive) { try { nv.stop(); } catch (e) {} return; }
    window.__nativeVoiceActive = true;
    voiceStart(btn, hint);
    let finalText = '', voiceErr = '';
    window.__voicePartial = (t) => { if (hint) hint.textContent = '“' + t + '”'; };
    window.__voiceResult = (t) => { finalText = t || ''; };
    window.__voiceError = (msg) => { voiceErr = msg || 'No se pudo escuchar.'; };
    window.__voiceEnd = () => {
      window.__nativeVoiceActive = false;
      voiceStop(btn);
      if (voiceErr) { if (hint) hint.textContent = voiceErr; }
      else applyFn(finalText);
    };
    try { nv.start(voiceLang()); } catch (e) { window.__nativeVoiceActive = false; voiceStop(btn); }
    return;
  }

  // 2) Web Speech API (Chrome / PWA sobre HTTPS o localhost).
  if (fuelRecognition) { try { fuelRecognition.stop(); } catch (e) {} fuelRecognition = null; return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  fuelRecognition = rec;
  rec.lang = voiceLang();
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  voiceStart(btn, hint);
  let finalText = '';
  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) finalText += r[0].transcript;
      else interim += r[0].transcript;
    }
    if (hint) hint.textContent = '“' + (finalText + interim).trim() + '”';
  };
  rec.onerror = (e) => { if (hint) hint.textContent = e.error === 'not-allowed' ? 'Permiso de micrófono denegado.' : 'No se pudo escuchar. Inténtalo de nuevo.'; };
  rec.onend = () => { voiceStop(btn); fuelRecognition = null; applyFn(finalText); };
  try { rec.start(); } catch (e) { fuelRecognition = null; }
};

// Extrae litros, precio/l y total de un texto OCR de ticket de gasolinera.
function parseReceiptText(text) {
  const out = {};
  const lines = String(text || '').split(/\n+/);
  const nums = (s) => [...s.matchAll(/(\d{1,4}(?:[.,]\d{1,3})?)/g)]
    .map((m) => parseFloat(m[1].replace(',', '.'))).filter(Number.isFinite);
  for (const ln of lines) {
    const l = ln.toLowerCase();
    if (out.liters == null && /litro|ltr|lts|\bl\b|litre/.test(l)) {
      const c = nums(l).find((n) => n > 1 && n < 200);
      if (c != null) out.liters = c;
    }
    if (out.ppl == null && /(€|eur)\s*\/\s*l|precio.*l|\bp\.?u\.?\b/.test(l)) {
      const c = nums(l).find((n) => n > 0.4 && n < 4);
      if (c != null) out.ppl = c;
    }
    if (out.total == null && /total|importe|a pagar/.test(l)) {
      const c = nums(l).filter((n) => n > 1 && n < 1000).sort((a, b) => b - a)[0];
      if (c != null) out.total = c;
    }
  }
  // Sin etiquetas claras: deduce por rangos típicos (precio 1-3, litros 5-120…).
  if (out.total == null || out.liters == null) {
    const all = nums(String(text || '').replace(/\n/g, ' '));
    if (out.ppl == null) out.ppl = all.find((n) => n > 0.9 && n < 3.2 && String(n).includes('.'));
    if (out.liters == null && out.ppl && out.total) out.liters = +(out.total / out.ppl).toFixed(2);
    if (out.total == null && out.ppl && out.liters) out.total = +(out.ppl * out.liters).toFixed(2);
  }
  return out;
}

// --- Foto del recibo en gastos (imagen guardada en el dispositivo, IndexedDB) ---
let _receiptDB = null;
function receiptDB() {
  return new Promise((res, rej) => {
    if (_receiptDB) return res(_receiptDB);
    let rq;
    try { rq = indexedDB.open('sc-receipts', 1); } catch (e) { return rej(e); }
    rq.onupgradeneeded = () => rq.result.createObjectStore('r');
    rq.onsuccess = () => { _receiptDB = rq.result; res(_receiptDB); };
    rq.onerror = () => rej(rq.error);
  });
}
async function receiptPut(id, dataUrl) { const db = await receiptDB(); return new Promise((res, rej) => { const tx = db.transaction('r', 'readwrite'); tx.objectStore('r').put(dataUrl, 'e' + id); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function receiptGet(id) { const db = await receiptDB(); return new Promise((res) => { const tx = db.transaction('r', 'readonly'); const rq = tx.objectStore('r').get('e' + id); rq.onsuccess = () => res(rq.result || null); rq.onerror = () => res(null); }); }
async function receiptDel(id) { const db = await receiptDB(); return new Promise((res) => { const tx = db.transaction('r', 'readwrite'); tx.objectStore('r').delete('e' + id); tx.oncomplete = () => res(); tx.onerror = () => res(); }); }
async function receiptClear() { const db = await receiptDB(); return new Promise((res) => { const tx = db.transaction('r', 'readwrite'); tx.objectStore('r').clear(); tx.oncomplete = () => res(); tx.onerror = () => res(); }); }
async function receiptKeys() { try { const db = await receiptDB(); return await new Promise((res) => { const tx = db.transaction('r', 'readonly'); const rq = tx.objectStore('r').getAllKeys(); rq.onsuccess = () => res(new Set((rq.result || []).map(String))); rq.onerror = () => res(new Set()); }); } catch (e) { return new Set(); } }
// Reduce la imagen para no ocupar mucho (máx. ~1400px, JPEG).
function downscaleImage(file, max = 1400, q = 0.72) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      const scale = Math.min(1, max / Math.max(w, h));
      w = Math.round(w * scale); h = Math.round(h * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { res(c.toDataURL('image/jpeg', q)); } catch (e) { rej(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src = url;
  });
}
