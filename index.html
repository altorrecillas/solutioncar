  renderReceipt();
};

window.openReminderModal = async function (id) {
  const v = currentVehicle();
  let r = {};
  if (id) r = (await api('GET', `/vehicles/${v.id}/reminders`)).find((x) => x.id === id) || {};
  openModal(
    id ? 'Editar recordatorio' : 'Nuevo recordatorio',
    field('Título *', 'title', 'text', r.title, 'required') +
      `<div class="row">${field('Fecha límite', 'due_date', 'date', r.due_date)}${field(`A los (${dU().u})`, 'due_odo', 'number', round2(kmToDisp(r.due_odo)), 'step=1')}</div>` +
      `<div class="row">${field(`Repetir cada (${dU().u})`, 'repeat_km', 'number', round2(kmToDisp(r.repeat_km)), 'step=1')}${field('Repetir cada (meses)', 'repeat_months', 'number', r.repeat_months, 'step=1')}</div>` +
      `<p class="muted" style="margin:-6px 0 14px;font-size:12px">Si defines repetición, al marcarlo como hecho se creará automáticamente el siguiente.</p>` +
      field('Notas', 'notes', 'text', r.notes),
    async (fd) => {
      fd.due_odo = dispToKm(fd.due_odo);
      fd.repeat_km = dispToKm(fd.repeat_km);
      if (id) await api('PUT', '/reminders/' + id, fd);
      else await api('POST', `/vehicles/${v.id}/reminders`, fd);
      renderTab();
      toast('Recordatorio guardado');
    },
    id ? null : 'reminder'
  );
};

window.openTripModal = async function (id) {
  const v = currentVehicle();
  if (!v) return;
  let t = {};
  if (id) t = tripCache.find((x) => x.id === id) || (await api('GET', `/vehicles/${v.id}/trips`)).find((x) => x.id === id) || {};
  const du = dU().u;
  const prevMax = id ? null : await maxOdoKm(v);
  const startOdoPrefill = t.start_odo != null ? kmToDisp(t.start_odo) : (prevMax != null ? kmToDisp(prevMax) : '');
  const sec = (title) => `<div class="form-section">${title}</div>`;
  openModal(
    id ? 'Editar viaje' : 'Añadir viaje',
    field('Título', 'title', 'text', t.title, 'placeholder="p. ej. Viaje a Madrid"') +
      selectField('Categoría', 'category', TRIP_CATEGORIES, t.category || 'privado') +
      sec('📍 Punto de inicio') +
      field('Origen', 'origin', 'text', t.origin) +
      `<div class="row">${field('Fecha', 'start_date', 'date', t.start_date || todayISO())}${field('Hora', 'start_time', 'time', t.start_time)}</div>` +
      field(`Cuentakilómetros inicial (${du})`, 'start_odo', 'number', round2(startOdoPrefill), 'step=1') +
      sec('🏁 Punto final') +
      field('Destino', 'destination', 'text', t.destination) +
      `<div class="row">${field('Fecha', 'end_date', 'date', t.end_date)}${field('Hora', 'end_time', 'time', t.end_time)}</div>` +
      field(`Cuentakilómetros final (${du})`, 'end_odo', 'number', round2(kmToDisp(t.end_odo)), 'step=1') +
      sec('Opcional') +
      `<div class="row">${field(`Coste por ${du} (${curSym})`, 'cost_per_km', 'number', round3(t.cost_per_km != null ? t.cost_per_km / dU().f : ''), 'step=0.001')}${field(`Coste del viaje (${curSym})`, 'trip_cost', 'number', t.trip_cost, 'step=0.01')}</div>` +
      field(`Distancia total (${du})`, 'distance', 'number', round2(kmToDisp(t.distance)), 'step=0.1') +
      field('Nota', 'notes', 'text', t.notes),
    async (fd) => {
      // Conversión a métrico (la BD guarda km y €/km).
      fd.start_odo = dispToKm(fd.start_odo);
      fd.end_odo = dispToKm(fd.end_odo);
      fd.distance = dispToKm(fd.distance);
      fd.cost_per_km = fd.cost_per_km !== '' && fd.cost_per_km != null ? Number(fd.cost_per_km) * dU().f : null;
      // Distancia = final − inicial si no se indicó.
      if (fd.distance == null && fd.start_odo != null && fd.end_odo != null) {
        const d = fd.end_odo - fd.start_odo;
        if (d > 0) fd.distance = d;
      }
      // Coste del viaje = coste/km × distancia si no se indicó.
      if ((fd.trip_cost === '' || fd.trip_cost == null) && fd.cost_per_km && fd.distance) {
        fd.trip_cost = +(fd.cost_per_km * fd.distance).toFixed(2);
      }
      if (id) await api('PUT', '/trips/' + id, fd);
      else await api('POST', `/vehicles/${v.id}/trips`, fd);
      renderTab();
      toast('Viaje guardado');
    },
    id ? null : 'trip'
  );
};
window.delTrip = (id) => deleteWithUndo('trip', id);

window.openFuelioModal = function () {
  const targets = [['new', '➕ Crear vehículo nuevo (recomendado)']].concat(
    state.vehicles.map((v) => [String(v.id), 'Añadir a: ' + v.name])
  );
  openModal(
    'Importar de Fuelio',
    `<div class="field"><label>Copia de Fuelio (.csv o .fuelio) *</label>
       <input type="file" name="csvfile" accept=".csv,.fuelio,text/csv,text/comma-separated-values,text/plain,application/octet-stream" required></div>` +
      selectField('Destino', 'target', targets, 'new') +
      `<p class="muted" style="font-size:12px;margin:0 0 14px">
        Vale el <strong>CSV</strong> (Fuelio: Ajustes → Copia de seguridad → Exportar CSV, uno por vehículo)
        o la <strong>copia completa .fuelio</strong> (todos los vehículos de golpe).
        Se importan repostajes, gastos y recordatorios; los duplicados se omiten automáticamente,
        así que puedes reimportar sin miedo.</p>`,
    async () => {
      const file = $('#modal-form input[type=file]').files[0];
      if (!file) throw new Error('Selecciona el fichero de Fuelio');
      const buf = await file.arrayBuffer();
      const head = new Uint8Array(buf.slice(0, 15));
      const isSqlite = String.fromCharCode.apply(null, head) === 'SQLite format 3';
      let batches; // [{name, csv}] — un CSV por vehículo
      if (isSqlite) {
        if (!window.fuelioDbToCSVs) throw new Error('Lector de copias .fuelio no disponible');
        batches = window.fuelioDbToCSVs(buf); // copia de sincronización (SQLite)
      } else if (head[0] === 0x50 && head[1] === 0x4b) {
        if (!window.fuelioZipToCSVs) throw new Error('Lector de copias .fuelio no disponible');
        batches = await window.fuelioZipToCSVs(buf); // copia local (ZIP con CSVs)
      } else {
        batches = [{ name: file.name, csv: new TextDecoder().decode(buf) }];
      }
      const target = $('#modal-form select[name=target]').value;
      if (target !== 'new' && batches.length > 1)
        throw new Error(`La copia contiene ${batches.length} vehículos; elige "Crear vehículo nuevo" para importarlos todos`);
      const tot = { fuel: 0, expenses: 0, reminders: 0, skipped: 0 };
      for (const b of batches) {
        const r = await api('POST', '/import/fuelio', {
          csv: b.csv,
          vehicle_id: target === 'new' ? null : Number(target),
        });
        if (r.vehicle_created) state.currentId = r.vehicle_id;
        tot.fuel += r.fuel || 0; tot.expenses += r.expenses || 0;
        tot.reminders += r.reminders || 0; tot.skipped += r.skipped || 0;
      }
      await loadVehicles();
      renderTab();
      toast(
        `Importado${batches.length > 1 ? ` (${batches.length} vehículos)` : ''}: ` +
          `${tot.fuel} repostajes, ${tot.expenses} gastos, ${tot.reminders} recordatorios` +
          (tot.skipped ? ` (${tot.skipped} omitidos)` : '')
      );
    }
  );
};

// ---------------------------------------------------------------------------
// Acciones de borrado / toggle
// ---------------------------------------------------------------------------
// Borrar vehículo con "Deshacer": copia todos sus datos (incluidas fotos de
// recibos y ficheros de documentos en modo local) antes de borrar y, si el
// usuario deshace, lo reconstruye entero con ids nuevos.
window.delVehicle = async (id) => {
  const v = state.vehicles.find((x) => x.id === id);
  if (!v) return;
  if (!(await confirmSheet('¿Borrar el vehículo y TODOS sus datos?', { okLabel: 'Borrar' }))) return;
  try {
    const [fuel, expenses, reminders, trips, docs] = await Promise.all([
      api('GET', `/vehicles/${id}/fuel`).catch(() => []),
      api('GET', `/vehicles/${id}/expenses`).catch(() => []),
      api('GET', `/vehicles/${id}/reminders`).catch(() => []),
      api('GET', `/vehicles/${id}/trips`).catch(() => []),
      api('GET', `/vehicles/${id}/documents`).catch(() => []),
    ]);
    const receipts = {};
    for (const e of expenses) { try { const r = await receiptGet(e.id); if (r) receipts[e.id] = r; } catch (ex) {} }
    const docFiles = {};
    if (window.getLocalDocUrl) {
      for (const d of docs) { try { const u = await window.getLocalDocUrl(d.id); if (u) docFiles[d.id] = u; } catch (ex) {} }
    }
    await api('DELETE', '/vehicles/' + id);
    await loadVehicles();
    renderTab();
    haptic(10);
    // Avisos que volverán a crearse solos al restaurar su documento con caducidad.
    const docRemIds = new Set(docs.filter((d) => docFiles[d.id] && d.reminder_id).map((d) => d.reminder_id));
    const strip = (row) => {
      const b = { ...row };
      delete b.id; delete b.vehicle_id; delete b.consumption; delete b.distance;
      delete b.km_per_l; delete b.created_at; delete b.done; delete b.last_notified;
      return b;
    };
    snackbarUndo(`Vehículo «${v.name}» eliminado`, async () => {
      const nv = { ...v }; delete nv.id;
      const created = await api('POST', '/vehicles', nv);
      for (const f of [...fuel].reverse()) await api('POST', `/vehicles/${created.id}/fuel`, strip(f));
      for (const e of [...expenses].reverse()) {
        const ne = await api('POST', `/vehicles/${created.id}/expenses`, strip(e));
        if (receipts[e.id] && ne && ne.id) { try { await receiptPut(ne.id, receipts[e.id]); } catch (ex) {} }
      }
      for (const r of reminders) {
        if (r.done || docRemIds.has(r.id)) continue; // hechos e importados de documentos, fuera
        await api('POST', `/vehicles/${created.id}/reminders`, strip(r));
      }
      for (const t of [...trips].reverse()) await api('POST', `/vehicles/${created.id}/trips`, strip(t));
      for (const d of docs) {
        if (!docFiles[d.id]) continue;
        await api('POST', `/vehicles/${created.id}/documents`, { title: d.title, doc_type: d.doc_type, expiry: d.expiry_date, dataUrl: docFiles[d.id], mime: d.mime, size: d.size });
      }
      setVehicle(created.id);
    });
  } catch (ex) {
    toast(ex.message, true);
  }
};

// Borrado con opción de deshacer (snackbar). Guarda el registro, lo borra y,
// si el usuario pulsa "Deshacer", lo vuelve a crear.
let undoTimer = null;
function snackbarUndo(msg, onUndo) {
  const old = $('#snackbar'); if (old) old.remove();
  clearTimeout(undoTimer);
  const el = document.createElement('div');
  el.id = 'snackbar';
  el.className = 'snackbar';
  el.innerHTML = `<span class="snack-msg">${esc(msg)}</span><button class="snack-btn" type="button">${ic('undo')} Deshacer</button>`;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  const close = () => { el.classList.remove('show'); setTimeout(() => el.remove(), 250); };
  let used = false;
  $('.snack-btn', el).addEventListener('click', async () => {
    if (used) return; used = true;
    clearTimeout(undoTimer); close(); haptic(12);
    try { await onUndo(); await loadVehicles(); renderTab(); toast('Restaurado'); }
    catch (ex) { toast(ex.message, true); }
  });
  undoTimer = setTimeout(close, 5500);
}
const UNDO_CFG = {
  fuel: { word: 'Repostaje', list: () => fuelCache, path: 'fuel' },
  expense: { word: 'Gasto', list: () => expCache, path: 'expenses' },
  reminder: { word: 'Recordatorio', list: () => remCache, path: 'reminders' },
  trip: { word: 'Viaje', list: () => tripCache, path: 'trips' },
};
async function deleteWithUndo(kind, id) {
  const cfg = UNDO_CFG[kind];
  const v = currentVehicle();
  if (!cfg || !v) return;
  let rec = (cfg.list() || []).find((x) => x.id === id);
  if (!rec) rec = (await api('GET', `/vehicles/${v.id}/${cfg.path}`)).find((x) => x.id === id);
  if (!rec) return;
  try {
    await api('DELETE', `/${cfg.path}/${id}`);
    await loadVehicles();
    renderTab();
    haptic(10);
    snackbarUndo(`${cfg.word} eliminado`, async () => {
      const body = { ...rec };
      delete body.id; delete body.vehicle_id; delete body.consumption; delete body.created_at;
      await api('POST', `/vehicles/${v.id}/${cfg.path}`, body);
    });
  } catch (ex) {
    toast(ex.message, true);
  }
}
window.delFuel = (id) => deleteWithUndo('fuel', id);
window.delExpense = (id) => deleteWithUndo('expense', id);
window.delReminder = (id) => deleteWithUndo('reminder', id);
window.toggleReminder = async (id, done) => {
  try {
    const r = await api('PUT', '/reminders/' + id, { done });
    renderTab();
    if (r.next_created) toast('Hecho ✓ · creado el siguiente recordatorio');
  } catch (ex) {
    toast(ex.message, true);
  }
};

// --- Banner de instalación de la PWA ---
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstall = e;
  maybeShowInstall();
});
window.addEventListener('appinstalled', () => { const b = $('#install-banner'); if (b) b.remove(); });
function maybeShowInstall() {
  if (!deferredInstall || localStorage.getItem('installDismissed')) return;
  if ($('#install-banner') || $('#login').classList.contains('hidden') === false) return; // no en login
  const b = document.createElement('div');
  b.id = 'install-banner';
  b.className = 'install-banner';
  b.innerHTML = `<span>📲 Instala <strong>SolutionCar</strong> en tu dispositivo</span>
    <div><button class="btn btn-sm btn-primary" id="ib-yes">Instalar</button><button class="btn btn-sm" id="ib-no">Ahora no</button></div>`;
  document.body.appendChild(b);
  $('#ib-yes').addEventListener('click', async () => {
    b.remove();
    if (deferredInstall) { deferredInstall.prompt(); await deferredInstall.userChoice; deferredInstall = null; }
  });
  $('#ib-no').addEventListener('click', () => { localStorage.setItem('installDismissed', '1'); b.remove(); });
}

// --- Pull-to-refresh (deslizar hacia abajo desde arriba) ---
function setupPullToRefresh() {
  const ind = document.createElement('div');
  ind.className = 'ptr';
  ind.textContent = '↻';
  document.body.appendChild(ind);
  let startY = 0;
  let pulling = false;
  // No en Ajustes (es un formulario: refrescar perdería lo escrito y no aporta).
  const active = () => $('#app') && !$('#app').classList.contains('hidden') && $('#modal').classList.contains('hidden') && !$('#report-overlay') && state.activeTab !== 'settings';
  const scroller = () => $('#main');
  window.addEventListener('touchstart', (e) => {
    const sc = scroller();
    pulling = active() && !!sc && sc.scrollTop <= 0;
    startY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      const d = Math.min(dy * 0.6, 90);
      ind.style.transform = `translateX(-50%) translateY(${d}px)`;
      ind.style.opacity = Math.min(1, d / 60);
      ind.classList.toggle('ready', d >= 60);
    }
  }, { passive: true });
  window.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const ready = ind.classList.contains('ready');
    ind.style.transform = 'translateX(-50%) translateY(0)';
    ind.style.opacity = '0';
    ind.classList.remove('ready');
    if (ready) { haptic(); renderTab(); }
  });
}

// Deslizar una fila hacia la izquierda para borrar (táctil).
function setupSwipe() {
  let el = null, startX = 0, startY = 0, dx = 0, dragging = false, justSwiped = false;
  const busy = () => $('#sheet') || !$('#modal').classList.contains('hidden') || $('#search-overlay');
  const reset = (animate) => {
    if (el) {
      el.style.transition = animate ? 'transform .2s ease' : '';
      el.style.transform = '';
      el.classList.remove('swipe-armed');
    }
    el = null; dragging = false;
  };
  document.addEventListener('touchstart', (e) => {
    const it = e.target.closest ? e.target.closest('.item-tap') : null;
    if (!it || busy()) { el = null; return; }
    el = it; startX = e.touches[0].clientX; startY = e.touches[0].clientY; dx = 0; dragging = false;
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!el) return;
    const mdx = e.touches[0].clientX - startX;
    const mdy = e.touches[0].clientY - startY;
    if (!dragging) {
      if (mdx < -10 && Math.abs(mdx) > Math.abs(mdy) * 1.5) { dragging = true; el.style.transition = 'none'; }
      else if (Math.abs(mdy) > 10) { el = null; return; }
    }
    if (dragging) {
      dx = Math.max(Math.min(0, mdx), -130);
      el.style.transform = `translateX(${dx}px)`;
      el.classList.toggle('swipe-armed', dx < -80);
      e.preventDefault();
    }
  }, { passive: false });
  document.addEventListener('touchend', () => {
    if (!el) return;
    const target = el;
    if (dragging && dx < -80) {
      justSwiped = true;
      setTimeout(() => (justSwiped = false), 500);
      reset(true);
      triggerSwipeDelete(target.dataset.kind, +target.dataset.id);
    } else {
      reset(true);
    }
  });
  // Evita que el "click" posterior a un swipe abra el menú de acciones.
  document.addEventListener('click', (e) => {
    if (justSwiped) { e.stopPropagation(); e.preventDefault(); justSwiped = false; }
  }, true);
}
function triggerSwipeDelete(kind, id) {
  if (kind === 'fuel') delFuel(id);
  else if (kind === 'expense') delExpense(id);
  else if (kind === 'reminder') delReminder(id);
  else if (kind === 'trip') delTrip(id);
  else if (kind === 'vehicle') delVehicle(id);
}

// Deslizar horizontalmente para cambiar entre las pestañas principales.
const SWIPE_TABS = ['dashboard', 'fuel', 'expenses', 'trips'];
function setupTabSwipe() {
  const main = $('#main');
  if (!main) return;
  let sx = 0, sy = 0, tracking = false;
  const canSwipe = () => $('#app') && !$('#app').classList.contains('hidden') &&
    $('#modal').classList.contains('hidden') && !$('#sheet') && !$('#report-overlay') &&
    !$('#lightbox') && !$('#onboard') && !$('#lockscreen');
  main.addEventListener('touchstart', (e) => {
    tracking = false;
    if (e.touches.length !== 1 || !canSwipe()) return;
    const t = e.target;
    if (t.closest && t.closest('.item-tap, input, select, textarea, .chart-wrap, .donut-wrap, .bars, .amount-chips, .chips, .seg, .accent-row')) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; tracking = true;
  }, { passive: true });
  main.addEventListener('touchend', (e) => {
    if (!tracking) return; tracking = false;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) < 72 || Math.abs(dx) < Math.abs(dy) * 1.7) return;
    const cur = SWIPE_TABS.indexOf(state.activeTab);
    if (cur === -1) return; // en una pestaña del menú "Más": no deslizar
    const ni = dx < 0 ? cur + 1 : cur - 1;
    if (ni < 0 || ni >= SWIPE_TABS.length) return;
    haptic(8);
    switchTab(SWIPE_TABS[ni], dx < 0 ? 'next' : 'prev');
  }, { passive: true });
}

// Botón flotante "volver arriba" en listas largas.
function setupBackToTop() {
  const b = document.createElement('button');
  b.className = 'to-top';
  b.setAttribute('aria-label', 'Volver arriba');
  b.textContent = '↑';
  const sc = $('#main');
  b.addEventListener('click', () => { (sc || window).scrollTo({ top: 0, behavior: 'smooth' }); haptic(8); });
  document.body.appendChild(b);
  const onScroll = () => b.classList.toggle('show', (sc ? sc.scrollTop : window.scrollY) > 500);
  if (sc) sc.addEventListener('scroll', onScroll, { passive: true });
  else window.addEventListener('scroll', onScroll, { passive: true });
}

(async function init() {
  if ('serviceWorker' in navigator && !window.LOCAL_MODE) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  setupPullToRefresh();
  setupBackToTop();
  setupSwipe();
  setupTabSwipe();
  try {
    const me = await api('GET', '/me');
    if (me.authenticated) {
      state.user = me.user;
      showApp();
      await boot();
      return;
    }
  } catch (ex) {
    /* sin sesion: seguimos a la pantalla de login */
  }
  try {
    const setup = await api('GET', '/setup');
    state.needsSetup = setup.needsSetup;
    if (setup.needsSetup) state.authMode = 'register';
  } catch (ex) {
    /* ignoramos: por defecto login */
  }
  showLogin();
})();
